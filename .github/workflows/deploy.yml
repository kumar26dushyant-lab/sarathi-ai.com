name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger deploy webhook
        run: |
          echo "Calling deploy webhook on sarathi-ai.com..."
          HTTP_CODE=$(curl -sf \
            -o /tmp/deploy_response.json \
            -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            https://sarathi-ai.com/internal/deploy)

          echo "Response code: $HTTP_CODE"
          cat /tmp/deploy_response.json 2>/dev/null || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "Deploy triggered successfully!"

      - name: Wait and verify
        run: |
          echo "Waiting 30s for deploy to complete..."
          sleep 30
          SARATHI=$(curl -sk -o /dev/null -w "%{http_code}" https://sarathi-ai.com/)
          NIDAAN=$(curl -sk -o /dev/null -w "%{http_code}" https://nidaanpartner.com/)
          echo "sarathi-ai.com: $SARATHI"
          echo "nidaanpartner.com: $NIDAAN"
          [ "$SARATHI" = "200" ] && [ "$NIDAAN" = "200" ] && echo "Both sites OK!" || (echo "Smoke test FAILED"; exit 1)
