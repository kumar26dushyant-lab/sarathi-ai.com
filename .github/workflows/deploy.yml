name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Oracle Cloud VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: 22
          script: |
            set -e

            # ── Pull latest code ──────────────────────────────────────────
            cd /opt/sarathi
            sudo git fetch origin master
            sudo git reset --hard origin/master

            # ── Syntax check before restart ───────────────────────────────
            /opt/sarathi/venv/bin/python -c "
            import ast
            with open('sarathi_biz.py', encoding='utf-8') as f:
                ast.parse(f.read())
            print('Syntax OK')
            "

            # ── Run DB migrations (idempotent) ────────────────────────────
            sudo /opt/sarathi/venv/bin/python -c "
            import asyncio, sys
            sys.path.insert(0, '.')
            from biz_database import init_db
            asyncio.run(init_db())
            print('DB migration OK')
            "

            # ── Restart service ───────────────────────────────────────────
            sudo systemctl restart sarathi
            sleep 6
            sudo systemctl is-active sarathi

            # ── Smoke test ────────────────────────────────────────────────
            SARATHI=$(curl -sk -o /dev/null -w "%{http_code}" https://sarathi-ai.com/)
            NIDAAN=$(curl -sk -o /dev/null -w "%{http_code}" https://nidaanpartner.com/)
            echo "sarathi-ai.com: $SARATHI"
            echo "nidaanpartner.com: $NIDAAN"
            [ "$SARATHI" = "200" ] && [ "$NIDAAN" = "200" ] && echo "Both sites OK" || exit 1
