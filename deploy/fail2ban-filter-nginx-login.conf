# fail2ban filter — nginx login endpoint hammering
# Place at: /etc/fail2ban/filter.d/nginx-login.conf

[Definition]
failregex = ^<HOST> .* "POST .*/api/auth/(send-email-otp|verify-email-otp|google-login|send-signup-otp|verify-signup-otp|refresh).* HTTP/\d" (4[0-9][0-9]|5[0-9][0-9]) .*$
            ^<HOST> .* "POST .*/api/sa/login.* HTTP/\d" (4[0-9][0-9]|5[0-9][0-9]) .*$
            ^<HOST> .* "POST .*/nidaan/api/(login|signup).* HTTP/\d" (4[0-9][0-9]|5[0-9][0-9]) .*$
ignoreregex =
