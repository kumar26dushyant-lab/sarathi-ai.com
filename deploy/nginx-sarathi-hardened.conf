# =============================================================================
#  Nginx — Sarathi-AI Hardened Config (replaces nginx-sarathi.conf)
#  Adds: rate limiting, bot blocking, strict CSP, server_tokens off,
#        fail2ban-compatible log format, video file serving.
#
#  Install: sudo cp deploy/nginx-sarathi-hardened.conf /etc/nginx/sites-available/sarathi
#           sudo ln -sf /etc/nginx/sites-available/sarathi /etc/nginx/sites-enabled/sarathi
#           sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Rate limit zones ───────────────────────────────────────────────────────
# Auth endpoints — strict (prevent OTP brute-force)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
# API endpoints — moderate
limit_req_zone $binary_remote_addr zone=api_limit:20m  rate=60r/m;
# General — generous
limit_req_zone $binary_remote_addr zone=general:20m    rate=200r/m;
# Webhook (Razorpay, Evolution) — relaxed
limit_req_zone $binary_remote_addr zone=webhook:5m     rate=30r/m;

# ── Connection limit ───────────────────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Bad bot / scanner blocklist ────────────────────────────────────────────
map $http_user_agent $bad_bot {
    default         0;
    ~*masscan        1;
    ~*zgrab          1;
    ~*Go-http-client 1;
    ~*python-requests 1;
    ~*libwww-perl    1;
    ~*sqlmap         1;
    ~*nikto          1;
    ~*nmap           1;
    ~*dirbuster      1;
    ""               1;   # empty UA
}

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name sarathi-ai.com www.sarathi-ai.com nidaanpartner.com www.nidaanpartner.com;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — Sarathi + Nidaan ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sarathi-ai.com www.sarathi-ai.com nidaanpartner.com www.nidaanpartner.com;

    # SSL — managed by Certbot (uncomment after: sudo certbot --nginx ...)
    # ssl_certificate     /etc/letsencrypt/live/sarathi-ai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sarathi-ai.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Hide server version (never advertise nginx version to attackers)
    server_tokens off;

    # Max upload — 50 MB for video uploads, CSV imports, voice notes
    client_max_body_size 50M;

    # Connection limits per IP
    limit_conn conn_limit 30;

    # Block known bad bots immediately
    if ($bad_bot) {
        return 444;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header Strict-Transport-Security   "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options             "SAMEORIGIN" always;
    add_header X-Content-Type-Options      "nosniff" always;
    add_header X-XSS-Protection            "1; mode=block" always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://accounts.google.com https://checkout.razorpay.com https://cdn.razorpay.com https://www.gstatic.com; "
        "style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; "
        "font-src 'self' https://fonts.gstatic.com; "
        "img-src 'self' data: blob: https:; "
        "connect-src 'self' https://api.razorpay.com https://lumberjack.razorpay.com https://accounts.google.com; "
        "frame-src https://api.razorpay.com https://accounts.google.com; "
        "object-src 'none'; "
        "base-uri 'self';" always;

    # ── Logging — fail2ban-compatible format ──────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # ── WebSocket (APK bridge) — long-lived ──────────────────────────────
    location /ws/agent {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout  3600s;
    }

    # ── Auth endpoints — tightest rate limit ──────────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Nidaan auth ───────────────────────────────────────────────────────
    location ~ ^/nidaan/api/(login|signup) {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Webhook endpoints — no rate limit (Razorpay/Evolution) ───────────
    location ~ ^/(api/payments/webhook|nidaan/api/webhook|webhook) {
        limit_req zone=webhook burst=20 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── API endpoints — moderate rate limit ───────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # ── Static files — Nginx serves directly (fast + no Python overhead) ──
    location /static/ {
        alias /opt/sarathi/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Disable directory listing
        autoindex off;
    }

    # ── Generated videos — served directly by Nginx ───────────────────────
    location /api/video/file/ {
        alias /opt/sarathi/generated_videos/;
        expires 1h;
        add_header Cache-Control "private";
        # Block direct browser access without a token (honour app-level auth)
        # App sets Content-Disposition: attachment so files download, not play inline
    }

    # ── Marketing uploads ─────────────────────────────────────────────────
    location /uploads/ {
        alias /opt/sarathi/uploads/;
        expires 1d;
        add_header Cache-Control "private";
        autoindex off;
    }

    # ── Health check — no logging ─────────────────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }

    # ── Block common scanner paths ────────────────────────────────────────
    location ~ /\. { deny all; access_log off; }
    location ~ \.(env|git|sh|sql|bak|gz|zip)$ { deny all; }
    location ~ ^/(wp-admin|wp-login|phpmyadmin|xmlrpc) { return 444; }

    # ── All other requests ────────────────────────────────────────────────
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}
