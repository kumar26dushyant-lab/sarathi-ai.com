# =============================================================================
#  Nginx Reverse Proxy — sarathi-ai.com
# =============================================================================
#  Install: sudo cp deploy/nginx-sarathi.conf /etc/nginx/sites-available/sarathi
#           sudo ln -s /etc/nginx/sites-available/sarathi /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
#
#  SSL:     sudo certbot --nginx -d sarathi-ai.com -d www.sarathi-ai.com
# =============================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name sarathi-ai.com www.sarathi-ai.com;
    return 301 https://$host$request_uri;
}

# HTTPS — main config
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sarathi-ai.com www.sarathi-ai.com;

    # SSL certs (managed by Certbot — these paths are auto-filled)
    # ssl_certificate /etc/letsencrypt/live/sarathi-ai.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sarathi-ai.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Max upload size (for voice notes, CSV imports)
    client_max_body_size 20M;

    # Proxy to Sarathi app
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # Static files — serve directly from Nginx for speed
    location /static/ {
        alias /opt/sarathi/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check — no logging
    location /health {
        proxy_pass http://127.0.0.1:8001/health;
        access_log off;
    }
}
