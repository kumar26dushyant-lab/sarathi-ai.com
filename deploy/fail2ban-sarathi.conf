# =============================================================================
#  fail2ban Jail Configuration — Sarathi-AI
#  Install: sudo cp deploy/fail2ban-sarathi.conf /etc/fail2ban/jail.d/sarathi.conf
#           sudo systemctl restart fail2ban
# =============================================================================

# ── SSH brute force ────────────────────────────────────────────────────────
[sshd]
enabled  = true
port     = ssh
maxretry = 4
bantime  = 2h
findtime = 10m

# ── Nginx: HTTP 4xx flood (scanners, scrapers) ────────────────────────────
[nginx-http-auth]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
maxretry = 10
findtime = 5m
bantime  = 1h

# ── Nginx: too many requests to API ──────────────────────────────────────
[nginx-limit-req]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/error.log
maxretry = 10
findtime = 2m
bantime  = 30m

# ── Nginx: login endpoint hammering ──────────────────────────────────────
[nginx-login]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
filter   = nginx-login
maxretry = 8
findtime = 5m
bantime  = 6h

# ── Nginx: known bad bots ─────────────────────────────────────────────────
[nginx-badbots]
enabled  = true
port     = http,https
logpath  = /var/log/nginx/access.log
filter   = nginx-badbots
maxretry = 1
bantime  = 24h
