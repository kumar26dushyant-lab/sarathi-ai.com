# =============================================================================
#  nginx upstream — zero-downtime web pool (blue-green)
# =============================================================================
#  Put the `upstream` block in the http{} context (e.g. top of your site conf,
#  OUTSIDE server{}). Then point every `proxy_pass` that currently targets
#  http://127.0.0.1:8000 at  http://sarathi_app  instead, and add the
#  proxy_next_upstream directives shown below inside the location block.
#
#  ip_hash = sticky sessions by client IP. REQUIRED because OTP/CSRF state is
#  in-process (biz_auth.py _otp_store etc.) — a client must keep hitting the same
#  web instance. When one instance is restarting, ip_hash reroutes its clients to
#  the other; an in-flight OTP started <deploy-window> ago may need re-requesting
#  (rare, only during a deploy). Moving OTP/CSRF to a shared store later removes
#  even that caveat.
# =============================================================================

upstream sarathi_app {
    ip_hash;
    server 127.0.0.1:8001 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8002 max_fails=2 fail_timeout=5s;
    keepalive 32;
}

# ── Inside each `location / { ... }` (and any other proxying location) ───────
#
#   proxy_pass http://sarathi_app;
#   proxy_http_version 1.1;
#   proxy_set_header Connection "";
#   proxy_set_header Host              $host;
#   proxy_set_header X-Real-IP         $remote_addr;
#   proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#
#   # If a backend is mid-restart, transparently retry the other one:
#   proxy_next_upstream error timeout http_502 http_503 http_504;
#   proxy_next_upstream_tries 2;
#   proxy_connect_timeout 2s;
#
# ─────────────────────────────────────────────────────────────────────────────
