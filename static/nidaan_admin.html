<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nidaan Admin Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.topbar{background:#1e293b;border-bottom:1px solid #334155;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:1.1rem;font-weight:700;color:#38bdf8}
.topbar .meta{font-size:.8rem;color:#94a3b8}
.main{max-width:1400px;margin:0 auto;padding:1.5rem}
/* Login gate */
#loginGate{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:2rem;width:360px;text-align:center}
.login-box h2{font-size:1.2rem;margin-bottom:1rem;color:#38bdf8}
.login-box input{width:100%;padding:.65rem .85rem;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:.95rem;margin-bottom:.75rem}
.login-box button{width:100%;padding:.7rem;background:#0891b2;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer}
.login-box button:hover{background:#0e7490}
.err-msg{color:#f87171;font-size:.82rem;margin-top:.5rem}
/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.75rem}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:1rem 1.25rem;text-align:center}
.stat-card .n{font-size:2rem;font-weight:800;color:#38bdf8}
.stat-card .l{font-size:.78rem;color:#94a3b8;margin-top:.2rem}
/* Tabs */
.tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:.45rem 1.1rem;border-radius:8px;background:#1e293b;border:1px solid #334155;color:#94a3b8;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.tab.active{background:#0891b2;border-color:#0891b2;color:#fff}
/* Table */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid #334155}
table{width:100%;border-collapse:collapse;background:#1e293b;font-size:.83rem}
th{background:#0f172a;color:#94a3b8;font-weight:600;padding:.6rem .8rem;text-align:left;white-space:nowrap}
td{padding:.55rem .8rem;border-top:1px solid #1e293b;color:#cbd5e1;vertical-align:top}
tr:hover td{background:#1a2744}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:5px;font-size:.73rem;font-weight:700}
.badge.intimated{background:#1e3a5f;color:#93c5fd}
.badge.assigned{background:#1a3640;color:#67e8f9}
.badge.in_review{background:#1e3a1e;color:#86efac}
.badge.in_negotiation{background:#3b2e00;color:#fbbf24}
.badge.resolved_won{background:#14532d;color:#4ade80}
.badge.resolved_lost{background:#450a0a;color:#fca5a5}
.badge.closed,.badge.withdrawn{background:#1e1e2e;color:#a1a1aa}
.badge.pending_payment{background:#3b2e00;color:#fbbf24}
.badge.active{background:#14532d;color:#4ade80}
.badge.silver{background:#334155;color:#e2e8f0}
.badge.gold{background:#3b2e00;color:#fbbf24}
.badge.platinum{background:#1e1e3f;color:#a78bfa}
/* Status update */
.status-sel{background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:6px;padding:.25rem .4rem;font-size:.78rem;cursor:pointer}
.upd-btn{background:#0891b2;color:#fff;border:none;border-radius:6px;padding:.25rem .6rem;font-size:.78rem;cursor:pointer;margin-left:.3rem;font-weight:600}
.upd-btn:hover{background:#0e7490}
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#14532d;color:#4ade80;padding:.65rem 1.1rem;border-radius:10px;font-size:.85rem;font-weight:600;display:none;z-index:999}
</style>
</head>
<body>

<div id="loginGate">
  <div class="login-box">
    <h2>🛡️ Nidaan Admin</h2>
    <input type="password" id="tokenInput" placeholder="Admin token" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Login</button>
    <div class="err-msg" id="loginErr"></div>
  </div>
</div>

<div id="panel" style="display:none">
  <div class="topbar">
    <h1>🛡️ Nidaan Admin Panel</h1>
    <div class="meta" id="lastRefresh"></div>
  </div>
  <div class="main">
    <div class="stats-row" id="statsRow"></div>
    <div class="tabs">
      <div class="tab active" onclick="showTab('claims')">Claims</div>
      <div class="tab" onclick="showTab('accounts')">Accounts</div>
      <div class="tab" onclick="showTab('reviews')">₹999 Reviews</div>
    </div>
    <div id="claimsPane"><div class="tbl-wrap"><table id="claimsTbl"><thead><tr><th>ID</th><th>Account</th><th>Firm</th><th>Client</th><th>Type</th><th>Insurer</th><th>Amount ₹</th><th>Status</th><th>Created</th><th>Update</th></tr></thead><tbody id="claimsTbody"></tbody></table></div></div>
    <div id="accountsPane" style="display:none"><div class="tbl-wrap"><table><thead><tr><th>ID</th><th>Owner</th><th>Firm</th><th>Email</th><th>Phone</th><th>Plan</th><th>Sub Status</th><th>Period End</th><th>Joined</th></tr></thead><tbody id="accountsTbody"></tbody></table></div></div>
    <div id="reviewsPane" style="display:none"><div class="tbl-wrap"><table><thead><tr><th>ID</th><th>Advisor</th><th>Phone</th><th>Email</th><th>Client</th><th>Type</th><th>Insurer</th><th>Amt ₹</th><th>Notes</th><th>Status</th><th>Created</th><th>Update</th></tr></thead><tbody id="reviewsTbody"></tbody></table></div></div>
  </div>
</div>

<div id="toast"></div>

<script>
const CLAIM_STATUSES = ['intimated','assigned','in_review','in_negotiation','resolved_won','resolved_lost','closed','withdrawn'];
let _token = '';
const API = (path) => `/nidaan/api/admin${path}`;

function doLogin() {
  _token = document.getElementById('tokenInput').value.trim();
  if(!_token){ document.getElementById('loginErr').textContent='Enter token'; return; }
  loadAll();
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + _token, 'Content-Type': 'application/json' } };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(API(path), opts);
  if(r.status === 401) { alert('Invalid token'); return null; }
  return r.json();
}

async function loadAll() {
  const [stats, claims, accounts, reviews] = await Promise.all([
    api('/stats'), api('/claims?limit=200'), api('/accounts?limit=300'), api('/review-requests?limit=200')
  ]);
  if(!stats) return;
  document.getElementById('loginGate').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  document.getElementById('lastRefresh').textContent = 'Refreshed: ' + new Date().toLocaleTimeString();
  renderStats(stats);
  renderClaims(claims.claims || []);
  renderAccounts(accounts.accounts || []);
  renderReviews(reviews.reviews || []);
}

function renderStats(s) {
  const items = [
    {n: s.total_accounts, l: 'Accounts'},
    {n: s.active_subscriptions, l: 'Active Subs'},
    {n: s.total_claims, l: 'Total Claims'},
    {n: s.open_claims, l: 'Open Claims'},
    {n: s.pending_review_requests, l: '₹999 Pending'},
    ...(Object.entries(s.plans||{}).map(([k,v]) => ({n:v, l:k+' plan'}))),
  ];
  document.getElementById('statsRow').innerHTML = items.map(i =>
    `<div class="stat-card"><div class="n">${i.n}</div><div class="l">${i.l}</div></div>`
  ).join('');
}

function badge(cls, text) { return `<span class="badge ${cls}">${text}</span>`; }
function dateStr(s) { if(!s) return '—'; return s.replace('T',' ').slice(0,16); }

function renderClaims(claims) {
  document.getElementById('claimsTbody').innerHTML = claims.map(c => `
    <tr>
      <td>${c.claim_id}</td>
      <td>${c.account_id}</td>
      <td>${c.firm_name||'—'}</td>
      <td>${c.insured_name}<br><small style="color:#64748b">${c.insured_phone}</small></td>
      <td>${c.claim_type}</td>
      <td>${c.insurer_name||'—'}</td>
      <td>${c.disputed_amount ? '₹'+c.disputed_amount.toLocaleString('en-IN') : '—'}</td>
      <td>${badge(c.status, c.status)}</td>
      <td>${dateStr(c.created_at)}</td>
      <td>
        <select class="status-sel" id="sel_${c.claim_id}">
          ${CLAIM_STATUSES.map(s=>`<option value="${s}"${s===c.status?' selected':''}>${s}</option>`).join('')}
        </select>
        <button class="upd-btn" onclick="updateClaimStatus(${c.claim_id})">✓</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="10" style="text-align:center;padding:2rem;color:#475569">No claims yet</td></tr>';
}

function renderAccounts(accounts) {
  document.getElementById('accountsTbody').innerHTML = accounts.map(a => `
    <tr>
      <td>${a.account_id}</td>
      <td>${a.owner_name}</td>
      <td>${a.firm_name||'—'}</td>
      <td>${a.email}</td>
      <td>${a.phone}</td>
      <td>${a.plan ? badge(a.plan, a.plan) : '—'}</td>
      <td>${a.sub_status ? badge(a.sub_status, a.sub_status) : '—'}</td>
      <td>${dateStr(a.current_period_end)}</td>
      <td>${dateStr(a.created_at)}</td>
    </tr>
  `).join('') || '<tr><td colspan="9" style="text-align:center;padding:2rem;color:#475569">No accounts yet</td></tr>';
}

function renderReviews(reviews) {
  const REVIEW_STATUSES = ['pending_payment','paid','in_review','completed','cancelled'];
  document.getElementById('reviewsTbody').innerHTML = reviews.map(r => `
    <tr>
      <td>${r.purchase_id}</td>
      <td>${r.advisor_name||'—'}</td>
      <td>${r.advisor_phone||'—'}</td>
      <td>${r.advisor_email||'—'}</td>
      <td>${r.insured_name}</td>
      <td>${r.claim_type||'—'}</td>
      <td>${r.insurer_name||'—'}</td>
      <td>${r.disputed_amount ? '₹'+r.disputed_amount.toLocaleString('en-IN') : '—'}</td>
      <td style="max-width:180px;word-break:break-word">${r.brief_description||'—'}</td>
      <td>${badge(r.status||'pending_payment', r.status||'pending_payment')}</td>
      <td>${dateStr(r.created_at)}</td>
      <td>
        <select class="status-sel" id="rsel_${r.purchase_id}">
          ${REVIEW_STATUSES.map(s => `<option value="${s}"${s===r.status?' selected':''}>${s.replace(/_/g,' ')}</option>`).join('')}
        </select>
        <button class="upd-btn" onclick="updateReviewStatus(${r.purchase_id})">Save</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="12" style="text-align:center;padding:2rem;color:#475569">No review requests yet</td></tr>';
}

async function updateClaimStatus(claim_id) {
  const sel = document.getElementById('sel_' + claim_id);
  const result = await api(`/claims/${claim_id}/status`, 'PATCH', {new_status: sel.value});
  if(result && result.status) { showToast('Updated → ' + result.status); loadAll(); }
}

async function updateReviewStatus(purchase_id) {
  const sel = document.getElementById('rsel_' + purchase_id);
  const result = await api(`/review-requests/${purchase_id}/status`, 'PATCH', {new_status: sel.value});
  if(result && result.status) { showToast('Review → ' + result.status); loadAll(); }
}

function showTab(tab) {
  ['claims','accounts','reviews'].forEach(t => {
    document.getElementById(t+'Pane').style.display = t===tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['claims','accounts','reviews'][i] === tab);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display='none', 2500);
}
</script>
</body>
</html>
