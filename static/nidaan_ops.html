    ${subs.length ? `<div class="table-wrap"><table><thead><tr><th>#</th><th>Plan</th><th>Cycle</th><th>Amount</th><th>Status</th><th>Started</th><th>Renews</th></tr></thead><tbody>${subRows}</tbody></table></div>` :
                    '<div style="color:rgba(255,255,255,.4);font-size:.82rem;padding:.5rem">No subscriptions</div>'}

    <div style="font-weight:700;font-size:.95rem;margin-top:1.25rem;margin-bottom:.5rem">Per-Claim Reviews — ₹499 (${purchases.length})</div>
    ${purchases.length ? `<div class="table-wrap"><table><thead><tr><th>#</th><th>Type</th><th>Insurer</th><th>Disputed</th><th>Paid</th><th>Status</th><th>Date</th></tr></thead><tbody>${purchRows}</tbody></table></div>` :
                          '<div style="color:rgba(255,255,255,.4);font-size:.82rem;padding:.5rem">No per-claim reviews</div>'}

    ${refunds.length ? `
      <div style="font-weight:700;font-size:.95rem;margin-top:1.25rem;margin-bottom:.5rem">Refunds (${refunds.length})</div>
      <div class="table-wrap"><table><thead><tr><th>#</th><th>Sub</th><th>Amount</th><th>Status</th><th>Reason</th><th>Date</th></tr></thead><tbody>${refundRows}</tbody></table></div>`:''}

function _acctTabClaims(d) {
  const claims = d.claims || [];
  if (!claims.length) return '<div style="padding:2rem;text-align:center;color:rgba(255,255,255,.4)">No claims</div>';
  const rows = claims.map(c => `
    <tr onclick="openClaimDrawer(${c.claim_id});closeAccountDrawer()" style="cursor:pointer">
      <td><strong>#${fmtClaimNum(c.claim_id)}</strong></td>
      <td>${esc(c.insured_name||'—')}</td>
      <td>${esc((c.claim_type||'').replace(/_/g,' '))}</td>
      <td>${esc(c.insurer_name||'—')}</td>
      <td>₹${fmt(c.disputed_amount||0)}</td>
      <td><span class="pill-status s-${c.status}" style="font-size:.7rem">${(c.status||'').replace(/_/g,' ')}</span></td>

    <thead><tr><th>#</th><th>Insured</th><th>Type</th><th>Insurer</th><th>Disputed</th><th>Status</th><th>Assigned</th><th>Open Tasks</th><th>Created</th></tr></thead>

  if (!tasks.length) return '<div style="padding:2rem;text-align:center;color:rgba(255,255,255,.4)">✓ No open tasks across this account\'s claims</div>';
  return tasks.map(t => `
    <div onclick="openClaimDrawer(${t.claim_id});closeAccountDrawer()"
         style="padding:.7rem 1rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;margin-bottom:.5rem;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem">
        <div style="flex:1;min-width:0">
          <div style="font-size:.88rem;font-weight:600">${esc(t.title||'Task')}</div>
          <div style="font-size:.76rem;color:rgba(255,255,255,.5);margin-top:.2rem">
            <a style="color:#22d3ee">#${fmtClaimNum(t.claim_id)}</a> · ${esc((t.status_slug||'').replace(/_/g,' '))}

function _acctTabActivity(d) {
  return _renderTimeline(d.timeline || [], false);
}

function _renderTimeline(items, compact) {
  if (!items.length) return '<div style="padding:1.5rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">No recent activity</div>';
  return items.map(it => {
    const icon = it.kind==='status' ? '🔄' : it.kind==='note' ? '💬' : it.kind==='payment' ? '💳' : '•';
    const title = it.kind==='status'
      ? `Status: ${esc((it.from_status||'—').replace(/_/g,' '))} → ${esc((it.to_status||'').replace(/_/g,' '))}`
      : it.kind==='note' ? 'Note added'
      : it.kind==='payment' ? `Payment · ${esc(it.detail||'')}`
      : '';
    const claimRef = it.claim_id
      ? `<a onclick="event.stopPropagation();openClaimDrawer(${it.claim_id});closeAccountDrawer()" style="color:#22d3ee;cursor:pointer">#${fmtClaimNum(it.claim_id)} ${esc(it.insured_name||'')}</a>`
      : '';
    const detail = it.kind === 'note' && it.detail ? `<div style="font-size:.78rem;color:rgba(255,255,255,.55);margin-top:.2rem">${esc(it.detail).substring(0,200)}${it.detail.length>200?'…':''}</div>` : '';
    return `
      <div style="display:flex;gap:.6rem;padding:.55rem .65rem;border-bottom:1px solid rgba(255,255,255,.05)">
        <div style="font-size:1rem;flex-shrink:0">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem">${title} ${claimRef ? ' · ' + claimRef : ''}</div>
          ${detail}
          <div style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.15rem">
            ${esc((it.ts||'').replace('T',' ').substring(0,16))}${it.staff_name?` · ${esc(it.staff_name)}`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function viewClaimDocs(claimId, btn) {
  // Toggle: if docs already showing below this row, close them
  const existingRow = document.getElementById('docsRow_' + claimId);
  if (existingRow) { existingRow.remove(); btn.textContent = '📎 View'; return; }
  btn.textContent = '⏳';
  try {
    const r = await API('/claims/' + claimId + '/documents');
    const d = await r.json().catch(()=>({docs:[]}));
    const td = btn.closest('tr');
    const colCount = td.cells.length;
    const newRow = document.createElement('tr');
    newRow.id = 'docsRow_' + claimId;
    newRow.style.cssText = 'background:rgba(59,130,246,.06)';
    newRow.innerHTML = `<td colspan="${colCount}" style="padding:.75rem 1rem">
      <div style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:.4rem">📎 DOCUMENTS FOR CLAIM #${fmtClaimNum(claimId)}</div>
      ${d.docs && d.docs.length > 0
        ? d.docs.map(f=>`<div style="margin:.25rem 0">📄 <a href="${f.url}" target="_blank" style="color:#93c5fd;text-decoration:none">${esc(f.original_name)}</a> <span style="opacity:.4;font-size:.75rem">(${(f.file_size/1024).toFixed(0)} KB · ${f.uploaded_at?f.uploaded_at.slice(0,10):''})</span></div>`).join('')
        : '<span style="color:rgba(255,255,255,.35);font-size:.82rem">No documents uploaded for this claim yet.</span>'
      }
    </td>`;
    td.insertAdjacentElement('afterend', newRow);
    btn.textContent = '📎 Close';
  } catch(e) {
    btn.textContent = '📎 View';
  }
}

async function showSarathiLink(accountId) {
  const r = await API('/accounts/'+accountId+'/sarathi-link');
  const d = await r.json().catch(()=>({}));
  const link = d.link;
  let body;
  if (link && link.sarathi_tenant_id) {
    body = `<div class="kv"><span class="kv-label">Sarathi Tenant ID</span><span class="kv-val">#${link.sarathi_tenant_id}</span></div>
            <div class="kv"><span class="kv-label">Source</span><span class="kv-val">${esc(link.source||'—')}</span></div>
            <div class="kv"><span class="kv-label">Linked On</span><span class="kv-val">${fmtDate(link.linked_at)}</span></div>`;
  } else {
    body = '<div style="color:rgba(255,255,255,.4);padding:.5rem 0">No Sarathi CRM account linked to this advisor.</div>';
  }
  openModal('Sarathi CRM Link — Account #'+accountId, body, [{label:'Close',cls:'btn-ghost',fn:closeModal}]);
}

async function loadReviews() {

          <div style="font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.15rem">
            <a href="mailto:${userEmail}" style="color:#22d3ee;text-decoration:none">${userEmail}</a> · ${userPhone}
          </div>
          <div style="font-size:.8rem;margin-top:.3rem;color:rgba(255,255,255,.55)">
            <b>${esc(rv.claim_type||'—').replace(/_/g,' ')}</b> · ${esc(rv.insurer_name||'—')} · ₹${fmt(rv.disputed_amount||0)} disputed
          </div>
          ${descSnip ? `<div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-top:.2rem">${esc(descSnip)}</div>` : ''}

async function toggleRvDetails(purchaseId) {
  const detail = document.getElementById(`rv-detail-${purchaseId}`);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : '';
  if (!isOpen) {
    // Load documents
    const docsEl = document.getElementById(`rv-docs-${purchaseId}`);
    try {
      const r = await API(`/review-requests/${purchaseId}/documents`);
      if (r.ok) {
        const d = await r.json();
        const docs = d.docs || [];
        if (docs.length) {
          docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br>` +
            docs.map(doc => `<div style="margin-top:.3rem"><a href="${esc(doc.url)}" target="_blank" style="color:#22d3ee;text-decoration:none">📄 ${esc(doc.original_name)}</a> <span style="opacity:.35">(${(doc.file_size/1024).toFixed(0)} KB)</span></div>`).join('');
        } else {
          docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br><span style="color:rgba(255,255,255,.25)">No documents uploaded</span>`;
        }
      }
    } catch(_) {
      docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br><span style="color:rgba(255,255,255,.25)">Could not load</span>`;
    }
  }
}

async function submitReviewUpdate(purchaseId) {
  const newStatus = document.getElementById('rv-new-status').value;
  const findings  = (document.getElementById('rv-findings')?.value || '').trim();
  const note      = (document.getElementById('rv-note')?.value || '').trim();
  const msg       = document.getElementById('rv-msg');
  if (newStatus === 'review_completed' && !findings) {
    msg.className='msg err'; msg.textContent='Findings note is required for Review Completed'; return;
  }
  const body = {new_status: newStatus, note, findings_note: findings};
  const r = await API('/review-requests/'+purchaseId+'/status', {method:'PATCH', body:JSON.stringify(body)});
  if (r.ok) { msg.className='msg ok'; msg.textContent='Status updated ✓'; setTimeout(()=>{closeModal();loadReviews();},900); }
  else { const d=await r.json().catch(()=>({})); msg.className='msg err'; msg.textContent=_extractErr(d,'Update failed'); }
}

async function createStaff() {

  const r=await API('/staff',{method:'POST',body:JSON.stringify(body)});

function openModal(title, bodyHtml, buttons=[], wide=false) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = buttons.map(b=>
    `<button class="btn ${b.cls}">${b.label}</button>`).join('');
  document.getElementById('modalFooter').querySelectorAll('button').forEach((btn,i)=>{
    btn.onclick = buttons[i].fn;
  });
  const modalEl = document.getElementById('modal');
  if (wide) modalEl.classList.add('modal-lg'); else modalEl.classList.remove('modal-lg');
  document.getElementById('modalBg').classList.add('open');
  // Close on backdrop click
  document.getElementById('modalBg').onclick = e => { if(e.target===document.getElementById('modalBg')) closeModal(); };
}

function closeModal() {
  document.getElementById('modal').classList.remove('modal-lg');
  document.getElementById('modalBg').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════════
function esc(s){ if(!s&&s!==0)return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ if(!n&&n!==0)return '0'; return Number(n).toLocaleString('en-IN'); }
function fmtClaimNum(id){ if (id == null || id === '') return '—'; return String(id).padStart(3, '0'); }
function fmtDate(s){
  if(!s)return '—';
  try{
    const d = (window.ndUI && ndUI.parseServerTime) ? ndUI.parseServerTime(s) : new Date(s);
    if(!d) return s;
    return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }catch{return s;}
}

async function _loadAssigneesOnce(){

function _statusLabel(slug, statuses) {

function _statusColor(slug, statuses) {

async function loadTasksKanban(){

let _currentTaskId = null;

// Render task notes as a 1-level threaded discussion.
// Notes with parent_note_id nest under their parent; deeper replies are
// flattened to the same level (enforced server-side too).
function _renderTaskThread(notes, taskId, canComment){
  if (!notes || !notes.length) {
    return '<div style="color:rgba(255,255,255,.35);font-size:.85rem">No comments yet — say something to kick things off.</div>';
  }
  const roleColors = {super_admin:'#a78bfa', sub_super_admin:'#22d3ee', team_member:'#86efac'};
  const roleLabel = {super_admin:'SA', sub_super_admin:'ADMIN', team_member:'ASSOC'};
  const byParent = {};
  const roots = [];
  notes.forEach(n => {
    if (n.parent_note_id) {
      (byParent[n.parent_note_id] = byParent[n.parent_note_id] || []).push(n);
    } else {
      roots.push(n);
    }
  });
  const renderNote = (n, isReply) => {
    const color = roleColors[n.staff_role] || '#94a3b8';
    const label = roleLabel[n.staff_role] || 'STAFF';
    return `
      <div style="${isReply?'margin-left:1.25rem;border-left:2px solid '+color+'33;padding-left:.6rem':''};margin-bottom:.6rem">
        <div style="font-size:.74rem;color:rgba(255,255,255,.55)">
          <span style="color:${color};font-weight:700">[${label}]</span>
          <b style="color:rgba(255,255,255,.85)">${esc(n.staff_name||'Staff')}</b> · ${ndUI.timeAgo(n.created_at)}
        </div>
        <div style="font-size:.88rem;margin-top:.15rem;white-space:pre-wrap">${esc(n.note)}</div>
        ${(!isReply && canComment) ? `
          <button onclick="toggleReply(${n.note_id})"
                  style="font-size:.72rem;background:transparent;border:none;color:rgba(34,211,238,.85);cursor:pointer;padding:.15rem 0;margin-top:.15rem">↩ Reply</button>
          <div id="replyBox_${n.note_id}" style="display:none;margin-top:.3rem">
            <input id="replyInput_${n.note_id}" placeholder="Reply to ${esc((n.staff_name||'').split(' ')[0])}…"
                   onkeydown="if(event.key==='Enter')addTaskNote(${taskId},${n.note_id})"
                   style="width:calc(100% - 60px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.4rem .55rem;border-radius:6px;font-size:.82rem">
            <button onclick="addTaskNote(${taskId},${n.note_id})"
                    style="margin-left:.3rem;background:rgba(34,211,238,.18);border:1px solid rgba(34,211,238,.3);color:#22d3ee;padding:.4rem .65rem;border-radius:6px;font-size:.78rem;cursor:pointer">Send</button>
          </div>` : ''}
        ${(byParent[n.note_id]||[]).map(c => renderNote(c, true)).join('')}
      </div>`;
  };
  return roots.map(n => renderNote(n, false)).join('');
}

function toggleReply(noteId){
  const box = document.getElementById('replyBox_'+noteId);
  if (!box) return;
  const show = box.style.display === 'none';
  box.style.display = show ? 'block' : 'none';
  if (show) setTimeout(() => document.getElementById('replyInput_'+noteId)?.focus(), 30);
}

async function taskTransition(taskId, toStatus, requiresNote){
  let note = '';
  if (requiresNote) {
    note = prompt('A short note is required to make this transition:');
    if (note === null) return;
    if (!note.trim()) { ndUI.toast('Note required','error'); return; }
  }
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/transition', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({to_status:toStatus, note: note||''})
  });
  if (r.ok) { ndUI.toast('Status updated','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e = await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Transition failed'),'error'); }
}

async function taskQC(taskId, approve){
  const note = prompt(approve?'QC approval note (optional):':'Reason for QC rejection:') || '';
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/qc-review', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({approve, note})
  });
  if (r.ok) { ndUI.toast(approve?'QC approved':'QC kicked back','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e=await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Failed'),'error'); }
}

async function taskApproval(taskId, approve){
  const note = prompt(approve?'Approval note (optional):':'Reason for rejection:') || '';
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/approve', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({approve, note})
  });
  if (r.ok) { ndUI.toast(approve?'Approval recorded':'Rejection recorded','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e=await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Failed'),'error'); }
}

async function addTaskNote(taskId, parentNoteId){
  const inputId = parentNoteId ? ('replyInput_'+parentNoteId) : 'taskNoteInput';
  const input = document.getElementById(inputId);
  const note = (input?.value||'').trim();
  if (!note) return;
  const body = { note, is_internal: true };
  if (parentNoteId) body.parent_note_id = parentNoteId;
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/notes', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) { input.value=''; openTaskDrawer(taskId); }
  else ndUI.toast('Failed to add note','error');
}

async function openReassignTask(taskId){
  const assignees = await _loadAssigneesOnce();
  const opts = assignees.map(a=>`<option value="${a.staff_id}">${esc(a.name)} (${esc(a.role)})</option>`).join('');
  const choice = prompt('Reassign to staff_id (one of):\n'+assignees.map(a=>`${a.staff_id} = ${a.name}`).join('\n')+'\nEnter blank to unassign:');
  if (choice === null) return;
  const newId = choice.trim() === '' ? null : parseInt(choice.trim());
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/assign', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({assigned_to_staff_id: newId})
  });
  if (r.ok) { ndUI.toast('Reassigned','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else ndUI.toast('Failed to reassign','error');
}

async function submitNewTask(claimId){
  const title = (document.getElementById('ntTitle_'+claimId)?.value || '').trim();
  if (!title) { ndUI.toast('Title is required','error'); return; }
  const assigneeVal = document.getElementById('ntAssignee_'+claimId).value;
  const priority = document.getElementById('ntPriority_'+claimId).value;
  const depToggle = document.getElementById('ntDepToggle_'+claimId).checked;
  const depVal = depToggle ? document.getElementById('ntDep_'+claimId).value : '';
  const comment = (document.getElementById('ntComment_'+claimId)?.value || '').trim();
  const body = {
    claim_id: claimId,
    title,
    status_slug: 'initial_review',
    priority,
  };
  if (assigneeVal) body.assigned_to_staff_id = parseInt(assigneeVal);
  if (depVal) body.depends_on_task_id = parseInt(depVal);
  if (comment) body.initial_comment = comment;
  const r = await fetch('/nidaan/ops/api/tasks', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) {
    ndUI.toast('Task created ✓','success');
    document.getElementById('newTaskForm_'+claimId)?.remove();
    loadClaimTasks(claimId);
  } else {
    const e = await r.json().catch(()=>({detail:'Error'}));
    ndUI.toast(_extractErr(e, 'Create failed'),'error');
  }
}

async function loadClaimTasks(claimId){
  const area = document.getElementById('claimTasksArea_'+claimId);
  if (!area) return;
  // Preserve any open create-form during refresh
  const openForm = document.getElementById('newTaskForm_'+claimId);
  const [statuses, assignees] = await Promise.all([_loadStatusesOnce(), _loadAssigneesOnce()]);
  const r = await fetch('/nidaan/ops/api/tasks?claim_id='+claimId, { headers: hdrs() });
  if (!r.ok) { area.innerHTML = '<div style="color:#fca5a5;font-size:.85rem">Failed to load tasks</div>'; return; }
  const d = await r.json();
  const tasks = d.tasks || [];

  if (!tasks.length) {
    area.innerHTML = (openForm ? openForm.outerHTML : '') +
      '<div style="padding:.75rem 0;font-size:.82rem;color:rgba(255,255,255,.4)">No tasks for this claim yet.</div>';
    return;
  }

  // Group by dependency: tasks with no `depends_on_task_id` are roots; others
  // nest under the task they're blocked by. Single-level tree.
  const byId = Object.fromEntries(tasks.map(t => [t.task_id, t]));
  const roots = tasks.filter(t => !t.depends_on_task_id || !byId[t.depends_on_task_id]);
  const children = {};
  tasks.forEach(t => {
    if (t.depends_on_task_id && byId[t.depends_on_task_id]) {
      (children[t.depends_on_task_id] = children[t.depends_on_task_id] || []).push(t);
    }
  });

  const renderTask = (t, isChild) => {
    const stColor = _statusColor(t.status_slug, statuses);
    const stLabel = _statusLabel(t.status_slug, statuses);
    const assignee = (assignees.find(a => a.staff_id === t.assigned_to_staff_id) || {}).name || 'Unassigned';
    const isComplete = (t.status_slug === 'completed' || t.status_slug === 'cancelled');
    const parent = t.depends_on_task_id ? byId[t.depends_on_task_id] : null;
    const isBlocked = parent && parent.status_slug !== 'completed' && parent.status_slug !== 'cancelled';
    const dueLabel = t.sla_due_at ? (t.sla_due_at||'').split('T')[0] : '';
    return `
      <div style="${isChild?'margin-left:1.5rem;border-left:2px solid rgba(255,255,255,.08);padding-left:.75rem':''}">
        <div onclick="openTaskDrawer(${t.task_id})"
             style="padding:.6rem .8rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-left:3px solid ${stColor};border-radius:6px;margin-bottom:.4rem;cursor:pointer;${isComplete?'opacity:.55':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
            <div style="flex:1;min-width:0">
              <div style="font-size:.86rem;font-weight:600">
                ${isChild?'↳ ':''}${esc(t.title||'Task')}
                ${isBlocked?'<span style="font-size:.7rem;color:#fbbf24;margin-left:.4rem">⏸ blocked</span>':''}
              </div>
              <div style="font-size:.74rem;color:rgba(255,255,255,.55);margin-top:.2rem">
                <span style="color:${stColor}">${esc(stLabel)}</span> · @ ${esc(assignee)}
                ${t.priority && t.priority!=='normal'?` · <b style="color:#fbbf24">${esc(t.priority)}</b>`:''}
              </div>
            </div>
            ${dueLabel ? `<div style="font-size:.72rem;color:rgba(255,255,255,.5);white-space:nowrap">${esc(dueLabel)}</div>`:''}
          </div>
        </div>
        ${(children[t.task_id]||[]).map(c => renderTask(c, true)).join('')}
      </div>`;
  };

  area.innerHTML = (openForm ? openForm.outerHTML : '') + roots.map(t => renderTask(t, false)).join('');
}

  const evoName = prompt(`Evolution instance name for slot ${slot} (e.g. nidaan_official_${slot}):`, `nidaan_official_${slot}`);
  if (!evoName) return;
  const r = await fetch('/nidaan/ops/api/official-numbers', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({instance_slot: slot, evolution_instance: evoName, display_name: displayName, phone_number: phone})

  if (r.ok) { ndUI.toast('Instance registered. Click "Show QR" next.','success'); loadOfficialNumbers(); }

}

  const r = await fetch(`/nidaan/ops/api/official-numbers/${slot}/qr`, { headers: hdrs() });

    const e = await r.json().catch(()=>({detail:'Error'}));

  const d = await r.json();
  const qrSrc = d.qr ? (d.qr.startsWith('data:') ? d.qr : 'data:image/png;base64,'+d.qr) : '';

  if (d.already_connected) {
    html = `

          <div style="font-size:.72rem;color:rgba(255,255,255,.4)">${rf.requested_at ? rf.requested_at.split('T')[0] : ''}</div>
          ${(rf.status==='failed' || rf.status==='pending') ? `<button class="nd-btn nd-btn-sm nd-btn-primary" onclick="retryRefund(${rf.refund_id})">🔁 Retry</button>` : ''}
          ${rf.razorpay_refund_id ? `<div style="font-size:.7rem;color:rgba(255,255,255,.4);font-family:monospace">${esc(rf.razorpay_refund_id)}</div>` : ''}
        </div>
      </div>
    </div>`;

  const reviewRow = (s) => `
    <div class="nd-card" style="padding:.85rem 1rem;margin-bottom:.55rem;border-left:3px solid #fbbf24">
      <div style="display:flex;justify-content:space-between;gap:.75rem;flex-wrap:wrap;align-items:flex-start">
        <div>
          <div style="font-weight:700">${esc(s.owner_name||'—')} · ₹${s.amount_paid}</div>
          <div style="font-size:.8rem;color:rgba(255,255,255,.6);margin-top:.15rem">${esc(s.account_email||'—')} · sub_id=${s.sub_id} · ${esc(s.plan)}</div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.45);margin-top:.2rem">
            Cancelled · 0 claims filed · in policy window
          </div>
        </div>
        <button class="nd-btn nd-btn-sm nd-btn-primary" onclick="processRefund(${s.sub_id},${s.amount_paid})">↩️ Refund ₹${s.amount_paid}</button>
      </div>
    </div>`;

  const isEmbedded = (panel.id !== 'panel-refunds');
  const wrap = isEmbedded ? '<div>' : '<div style="padding:1.25rem 1.5rem 2rem">';
  panel.innerHTML = `${wrap}
      ${isEmbedded ? '' : '<h1 style="font-size:1.4rem;font-weight:800;margin-bottom:.3rem">↩️ Refunds</h1>'}
      <div style="color:rgba(255,255,255,.5);font-size:.82rem;margin-bottom:1rem">
        Policy A: full refund when cancelled within <b>${policy.window_days||7} days</b> AND zero claims filed.
        Auto-triggered on cancel; failures can be retried below.
      </div>

      ${needsReview.length ? `
        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.55rem;color:#fbbf24">⚠️ Needs Action — ${needsReview.length} eligible but unrefunded</h3>
        <div style="margin-bottom:1.25rem">${needsReview.map(reviewRow).join('')}</div>
      ` : ''}

      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.55rem">Refund history</h3>
      ${refunds.length ? refunds.map(refundRow).join('') :
        '<div style="padding:1.5rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">No refunds yet</div>'}
    </div>`;
}

async function retryRefund(refundId){
  if (!confirm('Retry this refund? Razorpay will be called again.')) return;
  const r = await fetch('/nidaan/ops/api/refunds/'+refundId+'/retry', {
    method:'POST', headers: hdrs()
  });
  if (r.ok) { ndUI.toast('Refund retried successfully','success'); loadRefunds(); return; }
  const e = await r.json().catch(()=>({detail:'Failed'}));
  const msg = _extractErr(e, '');
  if (msg.includes('does not have enough balance')) {
    alert('Razorpay merchant balance is empty. Add funds in Razorpay Dashboard → Funds → Add Money, then retry this refund.');
  } else {
    ndUI.toast('Retry failed: '+(msg.substring(0,180)||r.status),'error');
  }
  loadRefunds();
}

async function processRefund(subId, amount){
  if (!confirm(`Process refund of ₹${amount} for sub_id ${subId}?`)) return;
  const r = await fetch('/nidaan/ops/api/refunds/manual', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({sub_id: subId, amount: amount, reason: 'sa_manual_from_needs_review'})
  });
  if (r.ok) { ndUI.toast('Refund processed','success'); loadRefunds(); }
  else {
    const e = await r.json().catch(()=>({detail:'Failed'}));
    ndUI.toast('Failed: '+_extractErr(e, String(r.status)),'error');
  }
}
</script>
