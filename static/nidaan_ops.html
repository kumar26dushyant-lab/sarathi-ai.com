<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>html.ops-has-token #loginScreen{display:none!important}</style>
<script>
/* No-flicker gate: if a saved ops session exists, hide the login screen BEFORE
   paint so it never flashes while the token is validated. init() reveals login
   again only if that validation fails. */
try { if (localStorage.getItem('nidaan_ops_token')) document.documentElement.classList.add('ops-has-token'); } catch (e) {}
</script>
<title>Nidaan Ops — Internal Portal</title>
<link rel="stylesheet" href="/static/nidaan_design.css?v=1">
<link rel="stylesheet" href="/static/nidaan_polish.css?v=1">
<link rel="icon" href="/static/nidaan_logo.png" type="image/png">
<!-- PWA: installable staff app -->
<link rel="manifest" href="/static/nidaan-ops.webmanifest">
<meta name="theme-color" content="#060d1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nidaan Ops">
<link rel="apple-touch-icon" href="/static/nidaan_logo.png">
<script src="/static/_err.js?v=1"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#060d1a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
a{color:#22d3ee;text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1.5rem;background:rgba(6,13,26,.97);border-bottom:1px solid rgba(255,255,255,.07);position:sticky;top:0;z-index:80;gap:.75rem}
/* App feel: when installed, keep the top bar clear of the notch/status bar and the
   content clear of the home indicator. */
@media (display-mode:standalone){
  .topbar{padding-top:calc(.7rem + env(safe-area-inset-top))}
  #appShell{padding-bottom:env(safe-area-inset-bottom)}
}
.topbar-brand{display:flex;align-items:center;gap:.55rem;font-weight:800;font-size:.95rem;color:#fff}
.topbar-brand img{height:28px;border-radius:5px}
.topbar-brand .pill{background:rgba(220,38,38,.18);color:#fca5a5;border:1px solid rgba(220,38,38,.3);border-radius:6px;font-size:.65rem;font-weight:800;padding:.15rem .45rem;letter-spacing:.04em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:.75rem;font-size:.83rem}
.role-badge{background:rgba(6,182,212,.12);color:#22d3ee;border:1px solid rgba(6,182,212,.25);border-radius:6px;padding:.2rem .55rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.btn-sm{padding:.35rem .8rem;border-radius:7px;font-size:.8rem;font-weight:600;border:none}
.btn-ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── LAYOUT ── */
.app-shell{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:rgba(255,255,255,.025);border-right:1px solid rgba(255,255,255,.06);padding:1rem 0;display:flex;flex-direction:column;gap:.15rem;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.25rem;font-size:.84rem;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;transition:background .12s,color .12s;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(6,182,212,.09);color:#22d3ee;border-left-color:#22d3ee}
.nav-item .badge{margin-left:auto;background:rgba(220,38,38,.25);color:#fca5a5;border-radius:10px;font-size:.68rem;font-weight:700;padding:.1rem .4rem;min-width:18px;text-align:center}
.nav-divider{height:1px;background:rgba(255,255,255,.06);margin:.5rem 1.25rem}
.main{flex:1;overflow-y:auto;padding:1.5rem 1.75rem}

/* ── SECTION HEADER ── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem}
.section-title{font-size:1.15rem;font-weight:800;color:#fff}
.section-sub{font-size:.8rem;color:rgba(255,255,255,.35);margin-top:.15rem}

/* ── STAT CARDS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:1.5rem}
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:1.1rem 1.25rem}
.stat-card .sv{font-size:1.9rem;font-weight:800;color:#22d3ee;line-height:1}
.stat-card .sl{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:.3rem;text-transform:uppercase;letter-spacing:.06em}
.stat-card.warn .sv{color:#fbbf24}
.stat-card.danger .sv{color:#f87171}
.stat-card.ok .sv{color:#4ade80}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid rgba(255,255,255,.07)}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead tr{background:rgba(255,255,255,.04)}
th{padding:.7rem 1rem;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.35);white-space:nowrap;border-bottom:1px solid rgba(255,255,255,.07)}
td{padding:.65rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;color:#cbd5e1}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}

/* ── STATUS PILLS ── */
.pill-status{display:inline-block;border-radius:6px;padding:.2rem .55rem;font-size:.7rem;font-weight:700;letter-spacing:.04em;text-transform:capitalize}
.s-intimated{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.s-assigned{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.25)}
.s-in_review{background:rgba(139,92,246,.12);color:#c4b5fd;border:1px solid rgba(139,92,246,.25)}
.s-in_negotiation{background:rgba(234,179,8,.12);color:#fde047;border:1px solid rgba(234,179,8,.25)}
.s-resolved_won{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.s-resolved_lost{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.s-closed,.s-withdrawn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.1)}
.s-active{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.s-inactive,.s-suspended{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.s-pending,.s-overdue{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.s-done{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}

/* ── BUTTONS ── */
.btn{padding:.55rem 1.1rem;border-radius:8px;font-size:.84rem;font-weight:700;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#0891b2;color:#fff}
.btn-danger{background:rgba(220,38,38,.15);color:#fca5a5;border:1px solid rgba(220,38,38,.35)}
.btn-warn{background:rgba(217,119,6,.15);color:#fcd34d;border:1px solid rgba(217,119,6,.35)}
.btn-success{background:rgba(21,128,61,.2);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.btn-icon{padding:.35rem .5rem;font-size:.82rem;border-radius:7px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.1)}
.btn-icon:hover{background:rgba(255,255,255,.12);color:#fff}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.1rem;align-items:center}
.filter-bar input,.filter-bar select{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.45rem .75rem;color:#fff;font-size:.82rem;outline:none}
.filter-bar input::placeholder{color:rgba(255,255,255,.25)}
.filter-bar select option{background:#1e293b;color:#fff}
/* Make ALL native dropdown options dark — fixes white-flash on QT modal etc.
   Browser support note: Firefox + Chromium honor this; Safari may fall back
   to system styling. Acceptable trade-off. */
select{color-scheme:dark}
select option{background-color:#0f1e3a;color:#fff}
.filter-bar input:focus,.filter-bar select:focus{border-color:#22d3ee}

/* ── DETAIL PANEL (slide-in drawer) ── */
.drawer-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;justify-content:flex-end}
.drawer-bg.open{display:flex}
.drawer{background:#0c1a2e;width:100%;max-width:600px;height:100%;overflow-y:auto;box-shadow:-4px 0 40px rgba(0,0,0,.5);padding:0;display:flex;flex-direction:column}
.drawer-top{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-top h2{font-size:1.05rem;font-weight:800;color:#fff}
.drawer-body{flex:1;overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.25rem}
.drawer-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:1rem}
.drawer-section h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin-bottom:.75rem}
.kv{display:flex;justify-content:space-between;align-items:flex-start;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.83rem;gap:.5rem}
.kv:last-child{border-bottom:none}
.kv-label{color:rgba(255,255,255,.4);flex-shrink:0;min-width:120px}
.kv-val{color:#e2e8f0;text-align:right;word-break:break-word}

/* ── TIMELINE ── */
.tl{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:.65rem;position:relative}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:9px;top:20px;width:2px;bottom:-8px;background:rgba(255,255,255,.08)}
.tl-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(34,211,238,.5);background:#0c1a2e;flex-shrink:0;margin-top:.15rem}
.tl-content{flex:1;padding-bottom:.85rem}
.tl-status{font-weight:700;font-size:.82rem;color:#22d3ee;text-transform:capitalize}
.tl-meta{font-size:.72rem;color:rgba(255,255,255,.3);margin-top:.1rem}
.tl-note{font-size:.79rem;color:rgba(255,255,255,.55);margin-top:.25rem;background:rgba(255,255,255,.03);border-radius:5px;padding:.3rem .5rem;border-left:2px solid rgba(34,211,238,.25)}

/* ── NOTES ── */
.note-item{background:rgba(255,255,255,.03);border-radius:8px;padding:.75rem;border-left:3px solid rgba(6,182,212,.3);margin-bottom:.5rem}
.note-meta{font-size:.7rem;color:rgba(255,255,255,.3);margin-bottom:.3rem}
.note-text{font-size:.83rem;color:#e2e8f0}
.note-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem .85rem;color:#fff;font-size:.84rem;resize:vertical;min-height:64px;outline:none}
.note-input:focus{border-color:#22d3ee}

/* ── FOLLOWUP ── */
.fu-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border-radius:8px;padding:.6rem .85rem;margin-bottom:.4rem;gap:.5rem;flex-wrap:wrap}
.fu-due{font-weight:700;font-size:.8rem;color:#fbbf24;flex-shrink:0}
.fu-due.overdue{color:#f87171}
.fu-note{font-size:.8rem;color:rgba(255,255,255,.55);flex:1;min-width:0}
.fu-who{font-size:.72rem;color:rgba(255,255,255,.3)}

/* ── FORM ── */
.form-field{margin-bottom:.85rem}
.form-field label{display:block;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.form-input{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem .85rem;color:#fff;font-size:.88rem;outline:none;transition:border .15s}
.form-input:focus{border-color:#22d3ee}
.form-input::placeholder{color:rgba(255,255,255,.2)}
select.form-input option{background:#1e293b}
.pwd-row{display:flex;gap:.5rem;align-items:center}
.pwd-row .form-input{flex:1;min-width:0}
.pwd-toggle{padding:.6rem .8rem;border-radius:8px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#fff;font-size:.82rem;font-weight:700;white-space:nowrap}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-bg.open{display:flex}
.modal{background:#0f1e3a;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1.75rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal.modal-lg{max-width:min(960px,96vw);padding:2rem}
.modal h3{font-size:1rem;font-weight:800;color:#fff;margin-bottom:1.25rem}
.modal-footer{display:flex;gap:.65rem;justify-content:flex-end;margin-top:1.25rem}

/* ── REVENUE SPLIT ── */
.split-card{background:linear-gradient(135deg,rgba(6,182,212,.08),rgba(14,116,144,.06));border:1px solid rgba(6,182,212,.2);border-radius:12px;padding:1.25rem}
.split-row{display:flex;align-items:center;gap:1rem;margin-bottom:.85rem}
.split-row:last-child{margin-bottom:0}
.split-name{font-weight:800;font-size:.95rem;width:90px;flex-shrink:0}
.split-bar-bg{flex:1;height:10px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden}
.split-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#0891b2,#22d3ee)}
.split-amount{font-weight:800;font-size:.95rem;color:#22d3ee;flex-shrink:0;width:100px;text-align:right}

/* ── HEALTH ── */
.health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.85rem;margin-bottom:1.25rem}
.health-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:.9rem 1.1rem}
.health-card .hc-val{font-size:1.5rem;font-weight:800;color:#22d3ee;line-height:1}
.health-card .hc-label{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:.25rem}

/* ── LOGIN SCREEN ── */
.login-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.login-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:2.5rem 2.25rem;width:100%;max-width:400px}
.login-logo{display:flex;align-items:center;gap:.65rem;margin-bottom:1.75rem}
.login-logo img{height:40px;border-radius:8px}
.login-logo span{font-weight:800;font-size:1.15rem;color:#fff}
.login-card h2{font-size:1.3rem;font-weight:800;color:#fff;margin-bottom:.35rem}
.login-card p{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:1.5rem}
.msg{font-size:.82rem;padding:.5rem .75rem;border-radius:7px;margin-bottom:.75rem;display:none}
.msg.err{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25);display:block}
.msg.ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.25);display:block}

/* ── CHART (minimal bar) ── */
.chart-bar-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.5rem;font-size:.8rem}
.chart-bar-label{width:80px;flex-shrink:0;color:rgba(255,255,255,.5);text-align:right}
.chart-bar-bg{flex:1;height:18px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0e7490,#22d3ee);transition:width .4s}
.chart-bar-val{width:60px;flex-shrink:0;color:#22d3ee;font-weight:700;text-align:left}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:3rem 1rem;color:rgba(255,255,255,.25)}
.empty .ei{font-size:2.5rem;margin-bottom:.5rem}
.empty p{font-size:.88rem}

/* ── MOBILE ── */
.hamburger-btn{display:none;flex-direction:column;justify-content:center;gap:5px;cursor:pointer;border:none;background:none;padding:.35rem .4rem;border-radius:6px;margin-right:.35rem}
.hamburger-btn span{display:block;width:20px;height:2px;background:#e2e8f0;border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100}
.sidebar-overlay.open{display:block}

@media(max-width:768px){
  .hamburger-btn{display:flex}
  .sidebar{
    position:fixed;top:0;left:-260px;bottom:0;
    width:240px;height:100vh;
    z-index:110;
    transition:left .24s ease;
    overflow-y:auto;
    border-right:1px solid rgba(255,255,255,.12);
  }
  .sidebar.mobile-open{left:0}
  .main{padding:1rem .85rem}
  .topbar{padding:.6rem .85rem}
  /* Bigger tap targets on touch screens */
  .btn-sm,.nd-btn-sm{padding:.55rem 1rem;font-size:.85rem;min-height:40px}
  .nav-item{padding:.85rem 1rem;min-height:44px}
  /* Force the inline Add Task grid to single column on phones */
  [id^="newTaskForm_"] > div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns:1fr !important
  }
  /* Account drawer hero stats become 2-col instead of 4 on narrow screens */
  #acctDrawerBody div[style*="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))"]{
    grid-template-columns:repeat(2,1fr) !important
  }
  /* Overview widget grid stacks below 600 (handled by auto-fit), this nudges
     the threaded-discussion reply input to wrap cleanly */
  [id^="replyBox_"] input{width:100% !important;display:block;margin-bottom:.3rem}
  [id^="replyBox_"] button{display:block;margin-left:0 !important;width:100%}
}
@media(max-width:480px){
  .drawer{max-width:100%}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .modal{padding:1.25rem}
  /* Account drawer fills the screen, no max-width gap */
  #acctDrawer > div{width:100% !important}
  /* Bird's-eye action buttons wrap cleanly */
  #acctDrawerBody > div:first-child > div:first-child{flex-direction:column;align-items:flex-start}
  /* Smaller table padding for cramped widths */
  .table-wrap table th,.table-wrap table td{padding:.45rem .55rem;font-size:.78rem}
}

/* ── Quick Task modal mobile polish ── */
@media(max-width:640px){
  /* Modal fills more of the viewport */
  #quickTaskModalBg > div{padding:1rem !important;max-width:100% !important}
  /* Assignee + due date stack instead of side-by-side */
  #quickTaskModalBg > div > div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns:1fr !important
  }
  /* Quick Task button hides label on phones to save space */
  #quickTaskBtn{font-size:.78rem;padding:.45rem .7rem}
  /* Leave modal: dates stack + fills viewport */
  #leaveModalBg > div{padding:1rem !important;max-width:100% !important}
  #leaveModalBg > div > div[style*="grid-template-columns:1fr 1fr"]{
    grid-template-columns:1fr !important
  }
  /* Tasks panel header (title + action buttons) stacks so buttons don't overflow */
  #panel-tasks .section-hdr{flex-direction:column;align-items:flex-start;gap:.6rem}
  #panel-tasks .section-hdr > div:last-child{width:100%;display:flex;flex-wrap:wrap}
  /* Task Registry: comfortable tap targets, no horizontal overflow */
  #tasksRegistry select{flex:1;min-width:140px}
  #tasksRegistry #regSearch{flex:1;min-width:140px}
  #tasksRegistry .nd-card{padding:.85rem}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN SCREEN ══════════ -->
<div id="loginScreen">
  <div class="topbar">
    <div class="topbar-brand">
      <img src="/static/nidaan_logo.png" alt="Nidaan" onerror="this.style.display='none'">
      Nidaan Partner
      <span class="pill">OPS</span>
    </div>
  </div>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/nidaan_logo.png" alt="">
        <span>Internal Portal</span>
      </div>
      <h2>Staff Sign In</h2>
      <p>Restricted access — Nidaan team only</p>
      <div class="msg" id="loginMsg"></div>
      <div class="form-field">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="you@nidaanpartner.com" autocomplete="username">
      </div>
      <div class="form-field">
        <label>Password</label>
        <div class="pwd-row">
          <input type="password" id="loginPwd" class="form-input" placeholder="Password" autocomplete="current-password">
          <button type="button" class="pwd-toggle" onclick="togglePasswordVisibility()">Show</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    </div>
  </div>
</div>

<!-- ══════════ APP SHELL ══════════ -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeMobileNav()"></div>
<div id="appShell" style="display:none;flex-direction:column;min-height:100vh">
  <div class="topbar">
    <div style="display:flex;align-items:center">

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let _token = null, _role = null, _staffId = null, _staffName = null, _staffEmail = null;
const NIDAAN_OWNER_EMAIL = 'dushyant@nidaanpartner.com';
let _currentPanel = 'overview';
let _claimsCache = [];

const API = (path, opts={}) => {
  const headers = {'Content-Type':'application/json'};
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  return fetch('/nidaan/ops/api' + path, {headers, ...opts});
};

// Generic headers helper used by Phase 3 & Phase 4 loaders (tasks, kanban,
// workflow settings, official numbers). Returns plain object so it composes
// with fetch({ headers: hdrs() }) and {...hdrs(), 'Content-Type': 'application/json'}.
function hdrs() {
  const h = {};
  if (_token) h['Authorization'] = 'Bearer ' + _token;
  return h;
}

// ═══════════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const msg   = document.getElementById('loginMsg');
  msg.className = 'msg'; msg.textContent = '';
  if (!email || !pwd) { msg.className='msg err'; msg.textContent='Enter email and password'; return; }
  const r = await fetch('/nidaan/ops/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, password: pwd}),
  });
  if (!r.ok) {
    const d = await r.json().catch(()=>({}));
    msg.className='msg err'; msg.textContent = _extractErr(d, 'Login failed'); return;
  }
  const data = await r.json();
  _token = data.token; _role = data.role;
  _staffId = data.staff_id; _staffName = data.name; _staffEmail = data.email || '';

  localStorage.setItem('nidaan_ops_token', _token);
  bootApp();
}

function doLogout() {
  localStorage.removeItem('nidaan_ops_token');
  _token = _role = _staffId = _staffName = _staffEmail = null;
  document.getElementById('loginScreen').style.display = '';
  document.getElementById('appShell').style.display = 'none';
}

// ═══════════════════════════════════════════════════════════════
//  MOBILE NAV
// ═══════════════════════════════════════════════════════════════
function toggleMobileNav() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════════════
async function bootApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('staffName').textContent = _staffName;
  document.getElementById('staffRoleBadge').textContent = _role.replace(/_/g,' ');
  // Quick Task shortcut — SA & sub-SA only
  if (_role === 'super_admin' || _role === 'sub_super_admin') {
    const btn = document.getElementById('quickTaskBtn');
    if (btn) btn.style.display = 'inline-block';
  }
  renderImpersonationBanner();
  buildSidebar();
  // Land on Tasks by default; honour a valid #panel from the URL (back/forward,
  // bookmarks) so navigation is restorable.
  const KNOWN_PANELS = ['tasks','overview','claims','accounts','branches','staff','settings','numbers','telegram','guide','revenue','health'];
  const hashPanel = (location.hash || '').replace('#','');
  const initial = KNOWN_PANELS.includes(hashPanel) ? hashPanel : 'tasks';
  showPanel(initial, true);
  try { history.replaceState({panel: initial}, '', '#' + initial); } catch(e){}
  // Notification bell — load + poll every 45s.
  loadBell();
  if (!_bellPoll) _bellPoll = setInterval(loadBell, 45000);
  // Phase 4: mandatory staff onboarding — save 3 official numbers
  await checkStaffOnboarding();
}

// Browser Back/Forward switches panels in-place instead of leaving the portal.
window.addEventListener('popstate', (e) => {
  if (document.getElementById('appShell').style.display === 'none') return; // not in app
  const id = (e.state && e.state.panel) || (location.hash || '').replace('#','') || 'tasks';
  if (document.getElementById('panel-' + id)) showPanel(id, true);
});

// ── Phase 4: Mandatory staff onboarding modal ───────────────────────────────
async function checkStaffOnboarding() {
  try {
    const [meR, onR] = await Promise.all([
      fetch('/nidaan/ops/api/me', {headers:{'Authorization':'Bearer '+_token}}),
      fetch('/nidaan/ops/api/official-numbers', {headers:{'Authorization':'Bearer '+_token}}),
    ]);
    if (!meR.ok) return;
    const me = await meR.json();
    const on = onR.ok ? await onR.json() : {instances:[]};
    // ONE-TIME comms onboarding. Ops notifications now run on Telegram (official
    // Bot API — no ban risk, nothing to re-pair), so this popup points people there.
    // It is acknowledged ONCE per staffer, server-side, and never shown again.
    if (me.comms_onboarded_at) return;
    showStaffOnboardModal(me.phone || '', !!me.telegram_chat_id);
  } catch(e){}
}
// One-time comms onboarding. Shown ONCE per staffer (acknowledged server-side),
// pointing them at Telegram — the channel ops notifications now run on.
function showStaffOnboardModal(currentPhone, alreadyLinked) {
  let bg = document.getElementById('staffOnboardBg');
  if (bg) bg.remove();
  bg = document.createElement('div');
  bg.id = 'staffOnboardBg';
  bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem';
  bg.innerHTML = `
    <div style="background:#0a1628;border:1px solid rgba(255,255,255,.18);border-radius:14px;max-width:520px;width:100%;padding:1.75rem;max-height:92vh;overflow-y:auto">
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.35rem;color:#7dd3fc">✈️ Set up your notifications — one time</h2>
      <p style="font-size:.9rem;color:rgba(255,255,255,.7);margin-bottom:1rem">
        NidaanPartner ops notifications (task assigned, mentions, approvals) now run on
        <b>Telegram</b> — it's official, instant and reliable, with nothing to re-pair.
      </p>
      ${alreadyLinked
        ? `<div style="background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35);border-radius:10px;padding:.8rem 1rem;margin-bottom:1rem;font-size:.88rem;color:#86efac">✅ Your Telegram is already connected — you're all set.</div>`
        : `<div style="background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.3);border-radius:10px;padding:.85rem 1rem;margin-bottom:1rem">
             <div style="font-size:.86rem;color:rgba(255,255,255,.85);margin-bottom:.5rem">Connect it in two taps:</div>
             <ol style="font-size:.85rem;line-height:1.8;color:rgba(255,255,255,.75);margin:0 0 .7rem 1.05rem">
               <li>Open <b>Telegram Bot</b> in the left menu</li>
               <li>Tap <b>Connect my Telegram</b> → press <b>Start</b></li>
             </ol>
             <button onclick="document.getElementById('staffOnboardBg').remove();showPanel('telegram')"
                     style="width:100%;background:#38bdf8;color:#04121f;padding:.6rem;border:none;border-radius:8px;font-weight:800;font-size:.88rem;cursor:pointer">
               ✈️ Take me there
             </button>
           </div>`}
      <label style="display:block;font-size:.82rem;color:rgba(255,255,255,.65);margin-bottom:.35rem">Your mobile number <span style="color:#fbbf24">*</span> (for records &amp; urgent contact)</label>
      <input id="staffOnboardPhone" type="tel" placeholder="98xxxxxxxx" value="${currentPhone||''}"
             style="width:100%;padding:.65rem .85rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;font-size:.95rem;margin-bottom:.85rem">
      <button onclick="confirmStaffOnboard()" style="width:100%;background:#22c55e;color:#0a1628;padding:.85rem;border:none;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer">
        ✓ Got it — don't show this again
      </button>
      <div style="font-size:.72rem;color:rgba(255,255,255,.35);text-align:center;margin-top:.5rem">You can always manage this from <b>Telegram Bot</b> in the menu.</div>
    </div>`;
  document.body.appendChild(bg);
}
function copyOpsNum(num) {
  navigator.clipboard.writeText(num).then(() => {
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);z-index:99999;background:#065f46;border:1px solid #10b981;border-radius:8px;padding:.5rem 1rem;color:#d1fae5;font-weight:600;font-size:.85rem';
    t.textContent = '✓ Copied ' + num;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(), 1500);
  });
}
async function confirmStaffOnboard() {
  const phone = document.getElementById('staffOnboardPhone').value.trim();
  const digits = phone.replace(/\D/g,'').slice(-10);
  if (digits.length !== 10) { alert('Please enter a valid 10-digit Indian mobile number.'); return; }
  try {
    const r = await fetch('/nidaan/ops/api/me/saved-numbers', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+_token},
      body: JSON.stringify({ phone })
    });
    if (!r.ok) { alert('Could not save. Try again.'); return; }
    // Permanent, server-side acknowledgement — this popup never appears again for
    // this staffer (on any device).
    try {
      await fetch('/nidaan/ops/api/me/comms-onboarded', { method:'POST', headers: hdrs() });
    } catch(e){}
    const bg = document.getElementById('staffOnboardBg');
    if (bg) bg.remove();
  } catch(e){ alert('Network error. Try again.'); }
}

function buildSidebar() {
  const roleRank = {team_member:0, sub_super_admin:1, super_admin:2};
  const myRank = roleRank[_role] ?? 0;
  const items = [
    {id:'tasks',      label:'✅ Tasks',         minRank:0},
    {id:'overview',   label:'📊 Overview',     minRank:0},
    {id:'claims',     label:'📋 All Claims',   minRank:1},
    {id:'accounts',   label:'👥 Accounts',     minRank:1},
    {id:'branches',   label:'🏢 Branches',     minRank:1},
    null,
    {id:'staff',      label:'👤 Staff',         minRank:2},
    {id:'settings',   label:'⚙️ Workflow Settings', minRank:2},
    {id:'numbers',    label:'📞 Official Numbers', minRank:2},
    {id:'telegram',   label:'✈️ Telegram Bot',     minRank:0},
    {id:'guide',      label:'📖 How to use',       minRank:0},
    null,
    {id:'revenue',    label:'💰 Revenue',       minRank:2, ownerOnly:true},
    {id:'health',     label:'🖥️ App Health',   minRank:2},
  ];
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const isOwner = (_staffEmail||'').toLowerCase() === NIDAAN_OWNER_EMAIL.toLowerCase();
  items.forEach(item => {
    if (!item) { const d=document.createElement('div'); d.className='nav-divider'; sb.appendChild(d); return; }
    if (myRank < item.minRank) return;
    if (item.ownerOnly && !isOwner) return;
    const el = document.createElement('div');
    el.className = 'nav-item' + (item.id===_currentPanel?' active':'');
    el.dataset.panel = item.id;
    el.textContent = item.label;
    el.onclick = () => showPanel(item.id);
    sb.appendChild(el);
  });
}

function showPanel(id, fromHistory) {
  _currentPanel = id;
  // Record a history entry so browser Back/Forward moves between panels
  // (instead of dropping out of the portal). Skip when we're responding to a
  // popstate or the initial boot render.
  if (!fromHistory) {
    try { history.pushState({panel: id}, '', '#' + id); } catch(e){}
  }
  closeMobileNav();  // close sidebar on mobile when navigating
  document.querySelectorAll('.panel').forEach(p=>p.style.display='none');
  const el = document.getElementById('panel-'+id);
  if (el) el.style.display = '';
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.classList.toggle('active', n.dataset.panel===id);
  });
  const loaders = {
    overview: loadOverview,
    tasks: loadTasks,
    claims: loadClaims,
    accounts: loadAccounts,
    branches: loadBranches,
    staff: loadStaff,
    settings: loadWorkflowSettings,
    numbers: loadOfficialNumbers,
    telegram: loadTelegramPanel,
    guide: loadGuidePanel,
    revenue: loadRevenue,
    health: loadHealth,
  };
  if (loaders[id]) loaders[id]();
}

// ═══════════════════════════════════════════════════════════════
//  OVERVIEW — single dashboard with 5 actionable widgets.
//  Task Pipeline · Pending Reviews · Follow-ups Due · Overdue Claims · Refunds
// ═══════════════════════════════════════════════════════════════
async function loadOverview() {
  const el = document.getElementById('panel-overview');
  el.innerHTML = `
    <div class="section-hdr">
      <div><div class="section-title">Overview</div>
      <div class="section-sub">Welcome back, ${esc(_staffName)} · what needs your attention</div></div>
    </div>
    <div class="stats-row" id="overviewStats">
      <div class="stat-card"><div class="sv">…</div><div class="sl">Loading</div></div>
    </div>
    <div id="overviewWidgets" style="margin-top:1.5rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1rem"></div>
    <div id="overviewClaimsWidget" style="margin-top:1.25rem"></div>
    <div id="overviewAdminWidgets" style="margin-top:1.25rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:1rem"></div>`;

  const r = await fetch('/nidaan/ops/api/overview-widgets', { headers: hdrs() });
  if (!r.ok) {
    document.getElementById('overviewStats').innerHTML =
      `<div class="stat-card warn"><div class="sv">!</div><div class="sl">Failed to load (${r.status})</div></div>`;
    return;
  }
  const d = await r.json();
  const isAdmin = (_role === 'super_admin' || _role === 'sub_super_admin');
  const totals = d.totals || {};
  const isOwner = ((_staffEmail||'').toLowerCase() === NIDAAN_OWNER_EMAIL.toLowerCase());

  // Top stat strip — kept small and actionable.
  document.getElementById('overviewStats').innerHTML = `
    <div class="stat-card"><div class="sv">${totals.total_claims||0}</div><div class="sl">Total Claims</div></div>
    <div class="stat-card warn"><div class="sv">${totals.open_claims||0}</div><div class="sl">Open Claims</div></div>
    <div class="stat-card"><div class="sv">${totals.active_subscriptions||0}</div><div class="sl">Active Subs</div></div>
    ${isOwner && d.refunds_needs_action ? `
      <div class="stat-card" style="border-color:#fbbf24;cursor:pointer" onclick="showPanel('revenue')">
        <div class="sv" style="color:#fbbf24">${d.refunds_needs_action}</div>
        <div class="sl">Refunds Need Action →</div>
      </div>` : ''}`;

  // First widget grid — works for every role. (Task widgets live in the Tasks panel.)
  document.getElementById('overviewWidgets').innerHTML = `
    ${isAdmin ? _widgetTopAccounts(d.top_accounts || []) : _widgetClaimsByStatus(d.claims_by_status || [])}
    ${_widgetPendingReviews(d.pending_reviews || [])}
    ${_widgetFollowupsDue(d.followups_due || [])}
    ${_widgetNeedsAttention(d.overdue_claims || [])}
  `;

  // Full-width inline Claims widget (with filter/search) — Option B core.
  document.getElementById('overviewClaimsWidget').innerHTML = `
    <div class="nd-card" style="padding:1rem">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.85rem;gap:.5rem;flex-wrap:wrap">
        <div style="font-weight:700;font-size:.98rem">📋 ${isAdmin?'All':'My'} Active Claims</div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap">
          <input id="ovClaimSearch" placeholder="🔍 search…"
                 oninput="renderActiveClaimsWidget(document.getElementById('ovClaimStatus').value, this.value)"
                 style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.35rem .6rem;border-radius:6px;font-size:.82rem;min-width:160px">
          <select id="ovClaimStatus" onchange="renderActiveClaimsWidget(this.value, document.getElementById('ovClaimSearch').value)"
                  style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.35rem .55rem;border-radius:6px;font-size:.82rem">
            <option value="">All statuses</option>
            <option value="intimated">Intimated</option>
            <option value="assigned">Assigned</option>
            <option value="in_review">In Review</option>
            <option value="in_negotiation">In Negotiation</option>
            <option value="resolved_won">Resolved Won</option>
            <option value="resolved_lost">Resolved Lost</option>
            <option value="closed">Closed</option>
          </select>
        </div>
      </div>
      <div id="ovClaimsBody"><div style="padding:1rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">Loading…</div></div>
    </div>`;
  renderActiveClaimsWidget('', '');

  // Admin-only bottom widget grid: recent comments + escalations + analytics.
  // (Quick Tasks + Workload moved to the dedicated Tasks panel.)
  if (isAdmin) {
    document.getElementById('overviewAdminWidgets').innerHTML = `
      ${_widgetRecentComments(d.recent_comments || [])}
      <div id="overviewEscalations">${_widgetEscalationsLoading()}</div>
      <div id="overviewAnalytics">${_widgetAnalyticsLoading()}</div>
    `;
    loadEscalationsWidget();
    loadAnalyticsWidget();
  }
}

// ═══════════════════════════════════════════════════════════════
//  TASKS — dedicated office-task panel (My + Team quick tasks,
//  task pipeline, and workload-by-assignee). Replaces the task
//  widgets that used to crowd the Overview.
// ═══════════════════════════════════════════════════════════════
const _ROLE_RANK = {team_member:0, sub_super_admin:1, super_admin:2};
let _opsSettingsCache = null;
async function _loadOpsSettings(force){
  if (_opsSettingsCache && !force) return _opsSettingsCache;
  const r = await fetch('/nidaan/ops/api/ops-settings', { headers: hdrs() });
  if (r.ok) _opsSettingsCache = await r.json();
  return _opsSettingsCache || {settings:{task_create_min_role:'team_member'}, can_edit:false};
}
// Can the current user create a DIRECT assignment (vs. only raise a request)?
function _canAssignTasks(){
  const minRole = ((_opsSettingsCache||{}).settings||{}).task_create_min_role || 'team_member';
  return (_ROLE_RANK[_role]||0) >= (_ROLE_RANK[minRole]||0);
}

async function loadTasks() {
  const el = document.getElementById('panel-tasks');
  const isAdmin = (_role === 'super_admin' || _role === 'sub_super_admin');
  await _loadOpsSettings(true);
  const canAssign = _canAssignTasks();
  el.innerHTML = `
    <div class="section-hdr">
      <div><div class="section-title">Tasks</div>
      <div class="section-sub">Office tasks, assignments, workload & leave</div></div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
        <input id="tasksTopSearch" placeholder="🔍 Search tasks or #id…" value="${esc(_registryState.q||'')}"
               oninput="tasksTopSearch(this.value)"
               style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:#fff;padding:.5rem .7rem;border-radius:8px;font-size:.85rem;min-width:180px">
        <button class="btn-sm btn-ghost" onclick="openLeaveModal('leave')">🌴 Leave</button>
        <button class="btn-sm btn-ghost" style="color:#7dd3fc" onclick="openLeaveModal('wfh')">🏠 WFH</button>

      </div>
    </div>
    <!-- Leave/WFH tiles sit ABOVE the task sections — who's away is context you need
         before you read the board. -->
    <div id="tasksLeave" style="margin-bottom:1.1rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem"></div>
    <div id="tasksDash" style="margin-bottom:1.1rem"></div>

      <div class="nd-card" style="padding:1rem;color:rgba(255,255,255,.4);font-size:.85rem">Loading…</div>
    </div>`;
  loadTasksDashboard();
  loadMyQuickTasksWidget();
  loadTaskRegistry();
  loadLeaveSection();

  const r = await fetch('/nidaan/ops/api/overview-widgets', { headers: hdrs() });
  if (!r.ok) {
    document.getElementById('tasksWidgets').innerHTML =
      `<div class="nd-card" style="padding:1rem;color:#f87171">Failed to load (${r.status})</div>`;
    return;
  }
  const d = await r.json();
  document.getElementById('tasksWidgets').innerHTML = `
    ${_widgetTaskPipeline(d.task_pipeline || [])}
    ${isAdmin ? _widgetWorkload(d.workload || []) : ''}

}

async function loadTasksDashboard(){
  const el = document.getElementById('tasksDash');
  if (!el) return;
  const isAdmin = (_role==='super_admin' || _role==='sub_super_admin');
  let c = {};
  try {
    const r = await fetch('/nidaan/ops/api/quick-tasks?with_counts=true&limit=1', { headers: hdrs() });
    if (r.ok) c = (await r.json()).counts || {};
  } catch(e){}
  let onLeave = 0;
  if (isAdmin) {
    try { const lr = await fetch('/nidaan/ops/api/leave', { headers: hdrs() });

  }

      ${card('Open', c.open, '#94a3b8', "tasksJump('open')")}
      ${card('In progress', c.in_progress, '#38bdf8', "tasksJump('in_progress')")}
      ${card('Done', c.done, '#86efac', "tasksJump('done')")}
      ${card('Overdue', c.overdue, '#f87171', "tasksJump('overdue')")}

}

// ── Leave (P4) ───────────────────────────────────────────────────────────────
const LEAVE_PILL = {
  pending:  {c:'#fbbf24', t:'Pending'},
  approved: {c:'#22c55e', t:'Approved'},
  rejected: {c:'#f87171', t:'Rejected'},
  cancelled:{c:'#94a3b8', t:'Cancelled'},
};

function _leaveWhen(l){
  const t = (l.start_time||l.end_time) ? ` <span style="color:rgba(255,255,255,.5)">⏰ ${esc(l.start_time||'')}${l.end_time?('–'+esc(l.end_time)):''}</span>` : '';
  if ((l.leave_type||'full_day')==='half_day'){
    const per = l.half_period==='second_half' ? 'afternoon' : 'morning';
    return `${esc(l.start_date)} · <span style="color:#fbbf24">½ day (${per})</span>${t}`;
  }
  return ((l.start_date===l.end_date) ? esc(l.start_date) : `${esc(l.start_date)} → ${esc(l.end_date)}`) + t;
}

async function loadLeaveSection(){

  if (!r.ok) { wrap.innerHTML = `<div class="nd-card" style="padding:1rem;color:#f87171">Failed to load leave (${r.status})</div>`; return; }
  const d = await r.json();
  const isAdmin = !!d.is_admin;
  const all = d.leave || [];
  const mine = all.filter(l => l.staff_id === _staffId);
  const pending = isAdmin ? all.filter(l => l.status === 'pending') : [];

        ${opts.showWho ? `<div style="font-size:.78rem;color:rgba(255,255,255,.6)">👤 ${esc(l.staff_name||'')}${l.staff_role?` · ${esc((l.staff_role||'').replace(/_/g,' '))}`:''}${(l.open_tasks)?` · <span style="color:#fbbf24">${l.open_tasks} task(s) in hand</span>`:''}</div>` : ''}

        ${(opts.showWho && l.cover_name) ? `<div style="font-size:.76rem;color:rgba(255,255,255,.55);margin-top:.1rem">🤝 Cover: ${esc(l.cover_name)}</div>` : ''}
        ${(opts.showWho && l.handover_notes) ? `<div style="font-size:.76rem;color:#c4b5fd;margin-top:.15rem;background:rgba(167,139,250,.08);padding:.3rem .45rem;border-radius:5px">📋 ${esc(l.handover_notes)}</div>` : ''}

  // My leave + WFH (everyone)
  cards += `<div class="nd-card" style="padding:1rem">

    </div>`;

    // Admin: upcoming approved leaves (next 30 days)

        </div>`).join('') : '<div style="color:rgba(255,255,255,.4);font-size:.85rem;padding:.5rem 0">No leaves scheduled in the next 30 days.</div>'}
      <div id="leaveTasksBox2" style="margin-top:.5rem"></div>

async function submitLeave(){
  const leave_type = document.querySelector('input[name=lvType]:checked')?.value || 'full_day';
  const start_date = document.getElementById('lvStart').value;
  let end_date = document.getElementById('lvEnd').value;
  const half_period = leave_type==='half_day' ? document.getElementById('lvHalf').value : '';
  if (leave_type==='half_day') end_date = start_date;
  const reason = (document.getElementById('lvReason').value||'').trim();
  const handover_notes = (document.getElementById('lvHandover').value||'').trim();
  const cover_staff_id = document.getElementById('lvCover').value ? parseInt(document.getElementById('lvCover').value) : null;
  if (!start_date || !end_date) { ndUI.toast('Pick a date','error'); return; }
  if (end_date < start_date) { ndUI.toast('End date is before start date','error'); return; }
  const kind = (window._lvKind === 'wfh') ? 'wfh' : 'leave';
  const body = {start_date, end_date, reason, leave_type, half_period, handover_notes,
    request_kind: kind,
    start_time: (document.getElementById('lvStartTime').value||''),
    end_time: (document.getElementById('lvEndTime').value||'')};
  if (cover_staff_id) body.cover_staff_id = cover_staff_id;
  const r = await fetch('/nidaan/ops/api/leave', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if (r.ok) {
    ndUI.toast((kind==='wfh'?'WFH request sent':'Leave request sent')+' — admins notified','success');
    document.getElementById('leaveModalBg')?.remove();
    if (_currentPanel === 'tasks') loadLeaveSection();
  } else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Request failed'),'error'); }
}

async function leaveDecide(leaveId, decision){
  const note = decision==='rejected' ? (prompt('Reason for rejection (optional):')||'') : '';
  const r = await fetch('/nidaan/ops/api/leave/'+leaveId+'/decision', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({decision, note})
  });
  if (r.ok) { ndUI.toast(decision==='approved'?'Approved ✓':'Rejected','success'); loadLeaveSection(); }
  else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Action failed'),'error'); }
}

async function leaveCancel(leaveId){
  if (!confirm('Withdraw this leave request?')) return;
  const r = await fetch('/nidaan/ops/api/leave/'+leaveId+'/cancel', { method:'POST', headers: hdrs() });
  if (r.ok) { ndUI.toast('Withdrawn','success'); loadLeaveSection(); }
  else ndUI.toast('Failed','error');
}

async function loadAnalyticsWidget(){
  const el = document.getElementById('overviewAnalytics');
  if (!el) return;
  const r = await fetch('/nidaan/ops/api/analytics?days=30', { headers: hdrs() });
  if (!r.ok) { el.innerHTML = '<div class="nd-card" style="padding:1rem;color:#fca5a5">Failed to load analytics ('+r.status+')</div>'; return; }
  const d = await r.json();
  const t = d.totals || {};
  const days = d.window_days || 30;

  const kpi = (label, val, sub) => `
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.55rem .7rem;min-width:0">
      <div style="font-size:.7rem;color:rgba(255,255,255,.5);text-transform:uppercase">${label}</div>
      <div style="font-weight:800;font-size:1.05rem;margin-top:.1rem">${val}</div>
      ${sub?`<div style="font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.05rem">${sub}</div>`:''}
    </div>`;

  // Daily trend mini-bars
  const days_data = d.new_claims_by_day || [];
  const maxDaily = Math.max(1, ...days_data.map(x => x.cnt));
  const trend = days_data.length
    ? `<div style="display:flex;gap:2px;align-items:flex-end;height:36px;margin-top:.2rem">
        ${days_data.map(b => `<div title="${esc(b.d)}: ${b.cnt}" style="flex:1;background:#22d3ee;height:${Math.max(8,(b.cnt/maxDaily*36))}px;border-radius:2px 2px 0 0;min-width:3px"></div>`).join('')}
       </div>
       <div style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.2rem">new claims, last ${days}d</div>`
    : '<div style="font-size:.78rem;color:rgba(255,255,255,.4);text-align:center;padding:.5rem">No new claims in window</div>';

  // By-stage list
  const stageItems = (d.by_stage_open||[]).map(s => `
    <div style="display:flex;justify-content:space-between;font-size:.78rem;padding:.2rem 0">
      <span style="text-transform:capitalize">${esc(s.stage)}</span><span>${s.cnt}</span>
    </div>`).join('') || '<div style="font-size:.78rem;color:rgba(255,255,255,.4)">—</div>';

  // Top reasons
  const reasonItems = (d.top_reasons||[]).slice(0,4).map(r => `
    <div style="display:flex;justify-content:space-between;font-size:.78rem;padding:.2rem 0">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">${esc(r.closed_reason)}</span>
      <span>${r.cnt}</span>
    </div>`).join('') || '<div style="font-size:.78rem;color:rgba(255,255,255,.4)">No closures with recorded reason</div>';

  // Top assignees by closures
  const assigneeItems = (d.top_assignees||[]).slice(0,5).map(a => `
    <div style="display:flex;justify-content:space-between;font-size:.78rem;padding:.2rem 0">
      <span>${esc(a.name||'—')}</span>
      <span>${a.closed} closed${a.won?` <span style="color:#86efac">(${a.won}W)</span>`:''}</span>
    </div>`).join('') || '<div style="font-size:.78rem;color:rgba(255,255,255,.4)">No closures in window</div>';

  el.innerHTML = `
    <div class="nd-card" style="padding:1rem">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.85rem">
        <div style="font-weight:700;font-size:.98rem">📈 Office Analytics</div>
        <div style="font-size:.78rem;color:rgba(255,255,255,.45)">last ${days} days</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.45rem;margin-bottom:.85rem">
        ${kpi('New', t.new_claims||0)}
        ${kpi('Closed', t.closed_total||0)}
        ${kpi('Closure', t.closure_rate_pct!=null?(t.closure_rate_pct+'%'):'—', t.new_claims?(t.closed_total+'/'+t.new_claims):'')}
        ${kpi('Win rate', t.win_rate_pct!=null?(t.win_rate_pct+'%'):'—', (t.won||0)+'W / '+(t.lost||0)+'L')}
        ${kpi('Cycle', t.avg_cycle_days!=null?(t.avg_cycle_days+'d'):'—', 'avg days to close')}
      </div>
      ${trend}
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.85rem;margin-top:.85rem">
        <div>
          <div style="font-size:.74rem;color:rgba(255,255,255,.55);margin-bottom:.25rem;text-transform:uppercase">Open by stage</div>
          ${stageItems}
        </div>
        <div>
          <div style="font-size:.74rem;color:rgba(255,255,255,.55);margin-bottom:.25rem;text-transform:uppercase">Top closures by staff</div>
          ${assigneeItems}
        </div>
        <div>
          <div style="font-size:.74rem;color:rgba(255,255,255,.55);margin-bottom:.25rem;text-transform:uppercase">Top reasons</div>
          ${reasonItems}
        </div>
      </div>
    </div>`;
}

async function qtSearchClaims(q){
  const box = document.getElementById('qtClaimResults');
  if (!box) return;
  // If a claim is already picked, ignore re-fires.
  if (document.getElementById('qtClaimId').value) return;
  q = (q||'').trim();
  const r = await fetch('/nidaan/ops/api/claim-search?q=' + encodeURIComponent(q), { headers: hdrs() });
  if (!r.ok) { box.style.display='none'; return; }
  const d = await r.json();
  if (!d.claims || !d.claims.length) {
    box.innerHTML = '<div style="padding:.55rem;color:rgba(255,255,255,.4);font-size:.82rem">No matches</div>';
    box.style.display = 'block';
    return;
  }
  // Build rows with data attributes — NO inline onclick. We attach handlers
  // post-render via addEventListener("mousedown") with preventDefault so:
  //  1. there's no race with the input's onblur (mousedown fires first), AND
  //  2. any quote/escape edge case in names can't break event binding.
  const heading = q ? '' :
    '<div style="padding:.4rem .65rem;font-size:.7rem;color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);text-transform:uppercase;letter-spacing:.04em">recent open claims</div>';
  box.innerHTML = heading + d.claims.map(c => {
    const acct = c.account_name || c.firm_name || '';
    return `
      <div class="qt-claim-row"
           data-cid="${c.claim_id}"
           data-cname="${esc(c.insured_name || '')}"
           style="padding:.55rem .7rem;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:.83rem">
        <div style="display:flex;justify-content:space-between;gap:.5rem;align-items:baseline">
          <b style="color:#22d3ee">#${fmtClaimNum(c.claim_id)}</b>
          <span style="font-size:.7rem;color:rgba(255,255,255,.4)">${esc(c.status||'').replace(/_/g,' ')}</span>
        </div>
        <div style="font-size:.82rem;margin-top:.15rem">${esc(c.insured_name||'—')}${c.insurer_name?` <span style="color:rgba(255,255,255,.4);font-size:.74rem">· ${esc(c.insurer_name)}</span>`:''}</div>
        ${acct ? `<div style="font-size:.72rem;color:rgba(255,255,255,.5);margin-top:.1rem">🏢 ${esc(acct)}</div>`:''}
      </div>`;
  }).join('');
  box.querySelectorAll('.qt-claim-row').forEach(row => {
    const cid = parseInt(row.dataset.cid, 10);
    const cname = row.dataset.cname || '';
    const pick = (e) => {
      if (e) e.preventDefault();  // keep the input from blurring on mousedown
      qtPickClaim(cid, cname);
    };
    row.addEventListener('mousedown', pick);
    row.addEventListener('touchstart', pick, {passive:false});
    row.addEventListener('mouseenter', () => row.style.background = 'rgba(34,211,238,.08)');
    row.addEventListener('mouseleave', () => row.style.background = 'transparent');
  });
  box.style.display = 'block';
}

function qtPickClaim(claimId, name){
  const hidden = document.getElementById('qtClaimId');
  const results = document.getElementById('qtClaimResults');
  const input   = document.getElementById('qtClaimSearch');
  const chip    = document.getElementById('qtClaimChip');
  const chipLabel = document.getElementById('qtClaimChipLabel');
  const label = `🔗 Linked: #${fmtClaimNum(claimId)} — ${name}`;
  if (hidden)  hidden.value = String(claimId);
  if (results) results.style.display = 'none';
  // Prefer the chip swap when available.
  if (chip && chipLabel && input) {
    chipLabel.textContent = label;
    chip.style.display = 'flex';
    input.value = '';
    input.style.display = 'none';
  } else if (input) {
    // Fallback: stuff the visible selection into the input itself with a
    // strong green outline so the user can't miss it.
    input.value = label;
    input.style.borderColor = '#22c55e';
    input.style.background = 'rgba(34,197,94,.14)';
    input.style.color = '#86efac';
    input.style.fontWeight = '700';
  }
  const oldLabel = document.getElementById('qtClaimPicked');
  if (oldLabel) oldLabel.innerHTML = '';
}

function qtUnpickClaim(){
  document.getElementById('qtClaimId').value = '';
  const input = document.getElementById('qtClaimSearch');
  const chip = document.getElementById('qtClaimChip');
  if (chip) chip.style.display = 'none';
  input.value = '';
  input.style.display = '';   // restore default
  input.focus();
}

// Focus handler that skips searching when a claim is already picked
// (the input contains the picked label, searching that string would be junk).
function qtOnFocusSearch(input){
  const picked = document.getElementById('qtClaimId').value;
  if (picked) return;  // keep displayed selection, don't show dropdown
  qtSearchClaims(input.value || '');
}

async function submitQuickTask(){
  const title = (document.getElementById('qtTitle')?.value || '').trim();
  if (!title || title.length < 2) { ndUI.toast('Title is required','error'); return; }
  const assigneeVal = document.getElementById('qtAssignee').value;
  const priority = (document.querySelector('input[name=qtPriority]:checked') || {}).value || 'normal';
  const claimVal = document.getElementById('qtClaimId').value;
  const dueDate = document.getElementById('qtDueDate').value || null;
  const comment = (document.getElementById('qtComment')?.value || '').trim();
  const category = document.getElementById('qtCategory')?.value || '';
  const requiresApproval = !!(document.getElementById('qtRequiresApproval') || {}).checked;
  const approverVal = (document.getElementById('qtApprover') || {}).value || '';
  const involveEl = document.getElementById('qtInvolve');
  const involveIds = involveEl ? Array.from(involveEl.selectedOptions).map(o=>parseInt(o.value)).filter(Boolean) : [];
  const fileInput = document.getElementById('qtCreateFile');
  const pickedFiles = (fileInput && fileInput.files) ? Array.from(fileInput.files) : [];
  const taskType = window._qtRequestMode ? 'request' : 'assignment';
  const body = { title, priority, requires_approval: requiresApproval, task_type: taskType };
  if (assigneeVal) body.assigned_to_staff_id = parseInt(assigneeVal);
  if (claimVal) body.claim_id = parseInt(claimVal);
  if (dueDate) body.due_date = dueDate;
  if (category) body.category_code = category;
  // Complainant details are mandatory for categories flagged as needing them.
  const _cw = document.getElementById('qtComplainantWrap');
  if (_cw && _cw.style.display === 'block') {
    const cn = (document.getElementById('qtComplainantName').value||'').trim();
    const cp = (document.getElementById('qtComplainantPhone').value||'').trim();
    if (!cn || !cp) { ndUI.toast('Complainant name and mobile number are required for this category','error'); return; }
    if (cp.replace(/\D/g,'').length < 10) { ndUI.toast('Enter a valid complainant mobile number','error'); return; }
    body.complainant_name = cn;
    body.complainant_phone = cp;
  }
  if (requiresApproval && approverVal) body.approver_staff_id = parseInt(approverVal);
  if (involveIds.length) body.mention_ids = involveIds;
  // When files are attached, the comment rides along with them on the first note
  // (multipart) after create; otherwise send it inline in the create body.
  if (comment && !pickedFiles.length) body.initial_comment = comment;
  const r = await fetch('/nidaan/ops/api/quick-tasks', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) {
    const dd = await r.json().catch(()=>({}));
    const newQid = dd.quick_task_id;
    // Upload the attachment(s) (with the comment) as the first note.
    if (pickedFiles.length && newQid) {
      try {
        const fd = new FormData();
        fd.append('note', comment || '');
        pickedFiles.forEach(f => fd.append('files', f));
        await fetch('/nidaan/ops/api/quick-tasks/'+newQid+'/notes', { method:'POST', headers: hdrs(), body: fd });
      } catch(e){ ndUI.toast('Task created, but the file upload failed — re-attach from the task.','error'); }
    }
    ndUI.toast(dd.task_type==='request' ? 'Request sent to admins ✓' : 'Quick task created ✓','success');
    document.getElementById('quickTaskModalBg').remove();
    if (_currentPanel === 'tasks') loadTasks();
    else if (_currentPanel === 'overview') loadOverview();
  } else {
    const e = await r.json().catch(()=>({detail:'Error'}));
    ndUI.toast(_extractErr(e, 'Create failed'),'error');
  }
}

function _qtCreateFilePicked(){

    lbl.style.display='block';
  } else { lbl.style.display='none'; }
}

// the working board stays short instead of growing forever.
let _registryState = {status:'active', type:'', category:'', assignee:'', q:'', sort:'smart', includeDeleted:false};
let _registrySearchTimer = null;

async function loadTaskRegistry(){
  const box = document.getElementById('tasksRegistry');
  if (!box) return;

  const p = new URLSearchParams();
  p.set('with_counts','true'); p.set('limit','200');
  const _st = _registryState.status;
  if (_st==='active') { p.set('include_done','false'); }
  else if (_st==='overdue') { p.set('include_done','true'); p.set('overdue','true'); }
  else if (_st==='pending_approval') { p.set('include_done','true'); p.set('pending_approval','true'); }
  else { p.set('include_done','true');
         if (_st && _st!=='all') p.set('status', _st); }
  if (_registryState.type) p.set('task_type', _registryState.type);
  if (_registryState.category) p.set('category', _registryState.category);
  if (_registryState.assignee) p.set('assignee', _registryState.assignee);
  if (_registryState.sort && _registryState.sort !== 'smart') p.set('sort', _registryState.sort);

          <span style="color:${st.color}">● ${st.label}</span>
          ${typePill}${apprPill}
          ${qt.assignee_name?`<span title="Assigned to">👤 ${esc(qt.assignee_name)}</span>`:'<span style="color:rgba(255,255,255,.35)">unassigned</span>'}
          ${qt.assignee_on_leave>0?`<span style="color:#fb923c;font-weight:700;background:rgba(251,146,60,.14);padding:.03rem .35rem;border-radius:4px" title="Assignee is on leave — consider reassigning">🌴 on leave</span>`:''}
          ${qt.creator_name?`<span style="color:rgba(255,255,255,.4)" title="Created by">✍️ ${esc(qt.creator_name)}</span>`:''}
          ${qt.due_date?`<span>📅 ${esc(qt.due_date)}</span>`:''}
          ${qt.claim_id?`<span>🔗 #${fmtClaimNum(qt.claim_id)}</span>`:''}
          <span style="color:rgba(255,255,255,.3)">${qt.created_at?ndUI.timeAgo(qt.created_at):''}</span>

async function qtDeleteRow(qid){
  if(!confirm('Delete this task? It is removed from active lists; its history is preserved.')) return;
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid, {method:'DELETE', headers:hdrs()});
  if(r.ok){ ndUI.toast('Task deleted','success'); loadTaskRegistry(); _refreshQuickTaskWidgets(); }
  else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Delete failed'),'error'); }
}

// Green blink = your task with new activity since you last opened it;
// gray = your task, caught up; nothing = not your task.
function _taskDot(qt){
  if (qt.has_new) return `<span class="unseen-dot" title="New activity — not seen yet"></span>`;
  if (qt.mine)    return `<span class="seen-dot" title="Seen — no new activity"></span>`;
  return '';
}
function _qtRow(qt, showAssignee){
  const prio = QT_PRIORITY_PILLS[qt.priority] || QT_PRIORITY_PILLS.normal;
  const status = QT_STATUS_PILLS[qt.status] || QT_STATUS_PILLS.open;
  const due = qt.due_date ? ' · 📅 '+esc(qt.due_date) : '';
  const claim = qt.claim_id ? ` · 🔗 #${fmtClaimNum(qt.claim_id)} ${esc(qt.insured_name||'')}` : '';
  return `
    <div onclick="openQuickTaskDrawer(${qt.quick_task_id})"

  if (!r.ok) { ndUI.toast('Failed to load quick task','error'); return; }
  const d = await r.json();
  const qt = d.quick_task;
  const notes = d.notes || [];
  const participants = d.participants || [];
  const meMuted = !!d.me_muted;
  window._qtMentions = {};   // fresh @mention picks for this drawer
  const prio = QT_PRIORITY_PILLS[qt.priority] || QT_PRIORITY_PILLS.normal;
  const status = QT_STATUS_PILLS[qt.status] || QT_STATUS_PILLS.open;
  const isAssignee = qt.assigned_to_staff_id === _staffId;
  const isCreator = qt.created_by_staff_id === _staffId;
  const isAdmin = (_role==='super_admin' || _role==='sub_super_admin');
  const iAmParticipant = (d.participants||[]).some(p => p.staff_id === _staffId);
  const canTransition = isAssignee || isAdmin;
  // Anyone involved — assignee, creator, admin, or an @mentioned collaborator — can comment.
  const canComment = isAssignee || isCreator || isAdmin || iAmParticipant;

  const reqAppr = !!qt.requires_approval;
  const apprStatus = qt.approval_status || 'none';

    pending:  {c:'#fbbf24', t:'⏳ Approval pending'},

      ${qt.status==='done' || qt.status==='cancelled' ? `<button class="btn-sm btn-ghost" onclick="qtSetStatus(${qt.quick_task_id},'open')">↺ Reopen</button>` : ''}
      ${qt.status!=='cancelled' && qt.status!=='done' && isAdmin ? `<button class="btn-sm btn-ghost" style="color:#fca5a5" onclick="qtSetStatus(${qt.quick_task_id},'cancelled')">✕ Cancel</button>` : ''}
    </div>` : '';

  // Approval actions — only admins (super_admin / sub_super_admin) can decide.

    </div>
    <div id="qtEditBox" style="display:none;margin-bottom:1rem"></div>
    <div id="qtHistoryBox" style="display:none;margin-bottom:1rem"></div>`;

  body.innerHTML = `
    <div style="padding:1rem 1.25rem 2rem">
      ${qt.merged_into ? `<div style="background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35);border-radius:8px;padding:.6rem .7rem;margin-bottom:.8rem;font-size:.82rem;color:#c4b5fd">⧉ This task was merged into <a style="color:#a78bfa;cursor:pointer;font-weight:700" onclick="openQuickTaskDrawer(${qt.merged_into})">#${qt.merged_into}</a></div>` : ''}

        <span class="task-pill" style="background:${status.color}22;color:${status.color};border:1px solid ${status.color}44">${status.label}</span>
        ${qt.task_type==='request' ? `<span class="task-pill" style="background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44">🙋 Request</span>` : ''}
        ${reqAppr && ap ? `<span class="task-pill" style="background:${ap.c}22;color:${ap.c};border:1px solid ${ap.c}44">${ap.t}</span>` : ''}
        ${_cat ? `<span class="task-pill" style="background:${_cat.color}22;color:${_cat.color};border:1px solid ${_cat.color}55">🏷️ ${esc(_cat.label)} (${esc(_cat.code)})</span>` : ''}

function _renderQTThread(notes, qid, canComment){
  if (!notes.length) return '<div style="color:rgba(255,255,255,.35);font-size:.85rem">No comments yet.</div>';
  const roleColors = {super_admin:'#a78bfa', sub_super_admin:'#22d3ee', team_member:'#86efac'};
  const roleLabel = {super_admin:'SA', sub_super_admin:'ADMIN', team_member:'ASSOC'};
  const isAdmin = (_role==='super_admin' || _role==='sub_super_admin');
  const byParent = {};
  const roots = [];
  notes.forEach(n => {
    if (n.parent_note_id) (byParent[n.parent_note_id] = byParent[n.parent_note_id] || []).push(n);
    else roots.push(n);
  });
  const renderNote = (n, isReply) => {
    const c = roleColors[n.staff_role] || '#94a3b8';
    const l = roleLabel[n.staff_role] || 'STAFF';
    // Seen-receipt — ✓ sent, ✓✓ Seen (by whom, on hover). Replaces approval.
    const readers = n.reads || [];
    const tick = readers.length
      ? `<span title="Seen by ${esc(readers.map(r=>r.name+' ('+ndUI.timeAgo(r.at)+')').join(', '))}" style="color:#4ade80;font-weight:700">✓✓ Seen</span>`
      : `<span title="Sent — not seen yet" style="color:rgba(255,255,255,.35);font-weight:700">✓ Sent</span>`;
    return `
      <div style="${isReply?'margin-left:1.25rem;border-left:2px solid '+c+'33;padding-left:.6rem':''};margin-bottom:.6rem">
        <div style="font-size:.74rem;color:rgba(255,255,255,.55)">
          <span style="color:${c};font-weight:700">[${l}]</span>
          <b style="color:rgba(255,255,255,.85)">${esc(n.staff_name||'Staff')}</b> · ${ndUI.timeAgo(n.created_at)} · ${tick}
        </div>
        <div style="font-size:.88rem;margin-top:.15rem;white-space:pre-wrap">${esc(n.note)}</div>
        ${n.note_translation ? `<div style="font-size:.8rem;margin-top:.25rem;color:#93c5fd;background:rgba(59,130,246,.08);border-left:2px solid rgba(59,130,246,.45);padding:.2rem .55rem;border-radius:0 5px 5px 0">🌐 English (auto): ${esc(n.note_translation)}</div>` : ''}
        ${(n.attachments && n.attachments.length)
          ? `<div style="margin-top:.25rem;display:flex;flex-wrap:wrap;gap:.3rem">${n.attachments.map(a=>`<a href="${esc(a.url)}" target="_blank" style="color:#93c5fd;text-decoration:none;font-size:.82rem;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:6px;padding:.15rem .45rem;display:inline-block">📎 ${esc(a.name||'attachment')}</a>`).join('')}</div>`
          : (n.attachment_url ? `<div style="margin-top:.25rem"><a href="${esc(n.attachment_url)}" target="_blank" style="color:#93c5fd;text-decoration:none;font-size:.82rem;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.25);border-radius:6px;padding:.15rem .45rem;display:inline-block">📎 ${esc(n.attachment_original_name||'attachment')}</a></div>` : '')}
        ${(!isReply && canComment) ? `
          <button onclick="qtToggleReply(${n.note_id})"
                  style="font-size:.72rem;background:transparent;border:none;color:rgba(34,211,238,.85);cursor:pointer;padding:.15rem 0">↩ Reply</button>
          <div id="qtReplyBox_${n.note_id}" style="display:none;margin-top:.3rem">
            <input id="qtReplyInput_${n.note_id}" placeholder="Reply…"
                   onkeydown="if(event.key==='Enter')qtAddNote(${qid},${n.note_id})"
                   style="width:calc(100% - 60px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.4rem .55rem;border-radius:6px;font-size:.82rem">
            <button onclick="qtAddNote(${qid},${n.note_id})"
                    style="margin-left:.3rem;background:rgba(34,211,238,.18);border:1px solid rgba(34,211,238,.3);color:#22d3ee;padding:.4rem .65rem;border-radius:6px;font-size:.78rem;cursor:pointer">Send</button>
          </div>` : ''}
        ${(byParent[n.note_id]||[]).map(child => renderNote(child, true)).join('')}
      </div>`;
  };
  return roots.map(n => renderNote(n, false)).join('');
}

function qtToggleReply(nid){
  const box = document.getElementById('qtReplyBox_'+nid);
  if (!box) return;
  const show = box.style.display === 'none';
  box.style.display = show ? 'block' : 'none';
  if (show) setTimeout(() => document.getElementById('qtReplyInput_'+nid)?.focus(), 30);
}

async function qtApproveNote(qid, noteId, approve){
  const r = await fetch(`/nidaan/ops/api/quick-tasks/${qid}/notes/${noteId}/approval`, {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({approve})
  });
  if (r.ok) { ndUI.toast(approve?'Comment approved ✓':'Approval removed','success'); openQuickTaskDrawer(qid); }
  else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Failed'),'error'); }
}

// Refresh the quick-task widgets when they're on-screen (Tasks panel, or
// Overview on older sessions). Called after any task mutation.
function _refreshQuickTaskWidgets(){
  if (_currentPanel === 'tasks') {
    loadMyQuickTasksWidget();
    if (typeof loadTaskRegistry === 'function') loadTaskRegistry();
  } else if (_currentPanel === 'overview') {
    loadMyQuickTasksWidget();
  }
}

async function qtSetStatus(qid, status){
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid, {
    method:'PATCH', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  if (r.ok) {
    ndUI.toast('Status updated','success');
    openQuickTaskDrawer(qid);  // refresh
    _refreshQuickTaskWidgets();
  } else ndUI.toast('Failed to update','error');
}

async function qtReassign(qid){
  const sel = document.getElementById('qtReassignSel');
  if (!sel) return;
  const newId = parseInt(sel.value, 10);
  if (!newId) { ndUI.toast('Pick an assignee','error'); return; }
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid, {
    method:'PATCH', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({assigned_to_staff_id:newId})
  });
  if (r.ok) {
    ndUI.toast('Reassigned ✓ — assignee notified','success');
    openQuickTaskDrawer(qid);
    _refreshQuickTaskWidgets();
  } else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Reassign failed'),'error'); }
}

async function qtApprove(qid, decision){
  const note = decision==='rejected'
    ? (prompt('Reason for rejection (optional):') || '')
    : '';
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid+'/approval', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({decision, note})
  });
  if (r.ok) {
    ndUI.toast(decision==='approved'?'Approved ✓':'Rejected','success');
    openQuickTaskDrawer(qid);
    _refreshQuickTaskWidgets();
  } else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Action failed'),'error'); }
}

async function qtDelete(qid){
  if (!confirm('Delete this task? It will be removed from active lists (history is kept).')) return;
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid, { method:'DELETE', headers: hdrs() });
  if (r.ok) {
    ndUI.toast('Task deleted','success');
    closeDrawer();
    _refreshQuickTaskWidgets();
  } else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Delete failed'),'error'); }
}

// ── Task merge (dedupe) ──────────────────────────────────────────────────────
let _mergeState = {baseId:null, baseTitle:'', otherId:null, otherTitle:'', retain:'base'};
async function openMergeModal(baseId){
  let base = {};
  try { base = (await (await fetch('/nidaan/ops/api/quick-tasks/'+baseId,{headers:hdrs()})).json()).quick_task || {}; } catch(e){}
  _mergeState = {baseId, baseTitle:base.title||'', otherId:null, otherTitle:'', retain:'base'};
  openModal('⧉ Merge Tasks', `
    <div style="font-size:.84rem;color:rgba(255,255,255,.65);margin-bottom:.75rem">Merge a duplicate into <strong>#${baseId}</strong>. Comments move to the retained task; the other is archived with a link back, and both timelines record the merge.</div>
    <label style="display:block;font-size:.74rem;color:rgba(255,255,255,.55);margin-bottom:.2rem">Find the duplicate task</label>
    <input id="mergeSearch" placeholder="Search title or #id…" oninput="mergeSearchTasks(this.value)" style="width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.5rem .7rem;border-radius:6px;font-size:.86rem;margin-bottom:.5rem">
    <div id="mergeResults" style="max-height:190px;overflow-y:auto;margin-bottom:.5rem"></div>
    <div id="mergeConfirm"></div>`,
    [{label:'Cancel', cls:'btn-ghost', fn:closeModal}]);
  mergeSearchTasks('');
}
async function mergeSearchTasks(q){
  const box = document.getElementById('mergeResults'); if(!box) return;
  const r = await fetch('/nidaan/ops/api/quick-tasks?include_done=true&limit=30'+(q?('&q='+encodeURIComponent(q)):''), { headers: hdrs() });
  const items = (r.ok ? (await r.json()).quick_tasks : []).filter(t=>t.quick_task_id!==_mergeState.baseId);
  box.innerHTML = items.length ? items.map(t=>`
    <div onclick="mergePick(${t.quick_task_id},'${esc((t.title||'').replace(/'/g,''))}')" style="padding:.45rem .5rem;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:.84rem">
      <span style="color:#22d3ee;font-family:monospace;font-weight:700">#${t.quick_task_id}</span> ${esc(t.title||'')} <span style="color:rgba(255,255,255,.4);font-size:.74rem">· ${esc(t.status)}</span>
    </div>`).join('') : '<div style="padding:.5rem;color:rgba(255,255,255,.4);font-size:.82rem">No matches</div>';
}
function mergePick(id, title){
  _mergeState.otherId = id; _mergeState.otherTitle = title; _mergeState.retain = 'base';
  const c = document.getElementById('mergeConfirm'); if(!c) return;
  c.innerHTML = `
    <div style="background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.25);border-radius:8px;padding:.7rem">
      <div style="font-size:.82rem;margin-bottom:.5rem">Which task should be <strong>kept</strong>? The other is merged into it.</div>
      <label style="display:block;font-size:.84rem;margin-bottom:.35rem;cursor:pointer"><input type="radio" name="mergeRetain" value="base" checked onchange="_mergeState.retain='base'"> Keep <strong>#${_mergeState.baseId}</strong> "${esc(_mergeState.baseTitle)}"</label>
      <label style="display:block;font-size:.84rem;margin-bottom:.6rem;cursor:pointer"><input type="radio" name="mergeRetain" value="other" onchange="_mergeState.retain='other'"> Keep <strong>#${id}</strong> "${esc(title)}"</label>
      <button class="btn-sm" style="background:#a78bfa;color:#0a1628;font-weight:700;width:100%" onclick="doMerge()">⧉ Merge</button>
    </div>`;
}
async function doMerge(){
  const {baseId, otherId, retain} = _mergeState;
  if(!otherId){ ndUI.toast('Pick a task to merge','error'); return; }
  const keep = retain==='base' ? baseId : otherId;
  const drop = retain==='base' ? otherId : baseId;
  if(!confirm(`Keep #${keep} and merge #${drop} into it?\n#${drop} will be archived (its comments move to #${keep}).`)) return;
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+keep+'/merge', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({duplicate_id: drop})
  });
  if(r.ok){ ndUI.toast('Tasks merged ✓','success'); closeModal(); _refreshQuickTaskWidgets(); openQuickTaskDrawer(keep); }
  else { const d=await r.json().catch(()=>({})); ndUI.toast(_extractErr(d,'Merge failed'),'error'); }
}

function _qtFilePicked(){

    lbl.style.display='block';
  } else { lbl.style.display='none'; }

// ── @mention autocomplete in the task comment box ────────────────────────────
let _qtMentionMatches = [];
function _qtMentionInput(el){
  const box = document.getElementById('qtMentionBox');
  if (!box) return;
  const caret = el.selectionStart || el.value.length;
  const upto = el.value.slice(0, caret);
  const at = upto.lastIndexOf('@');
  if (at < 0) { box.style.display='none'; return; }
  const query = upto.slice(at + 1);
  if (query.length > 24) { box.style.display='none'; return; }   // moved past a mention
  const q = query.trim().toLowerCase();
  _qtMentionMatches = (_assigneesCache || [])
      .filter(s => (s.name||'').toLowerCase().includes(q))
      .filter(s => s.staff_id !== _staffId)
      .slice(0, 6);
  if (!_qtMentionMatches.length) { box.style.display='none'; return; }
  box.dataset.at = at;
  box.innerHTML = _qtMentionMatches.map((s,i)=>
    `<div onmousedown="event.preventDefault();_qtPickMention(${i})" style="padding:.5rem .7rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.06)" onmouseover="this.style.background='rgba(255,255,255,.06)'" onmouseout="this.style.background='transparent'">👤 ${esc(s.name)}</div>`).join('');
  box.style.display='block';
}
function _qtPickMention(idx){
  const el = document.getElementById('qtNoteInput');
  const box = document.getElementById('qtMentionBox');
  const s = _qtMentionMatches[idx];
  if (!el || !box || !s) return;
  const at = parseInt(box.dataset.at || '-1');
  const caret = el.selectionStart || el.value.length;
  if (at >= 0) el.value = el.value.slice(0, at) + '@' + s.name + ' ' + el.value.slice(caret);
  window._qtMentions = window._qtMentions || {};
  window._qtMentions[s.staff_id] = s.name;
  box.style.display='none';
  el.focus();
}

async function qtSaveEdit(qid){
  const payload = {
    title: (document.getElementById('qtEdTitle').value||'').trim(),
    description: document.getElementById('qtEdDesc').value||'',
    category_code: document.getElementById('qtEdCat').value||'',
    due_date: document.getElementById('qtEdDue').value||'',
    priority: document.getElementById('qtEdPrio').value||'normal',
    complainant_name: document.getElementById('qtEdCompName').value||'',
    complainant_phone: document.getElementById('qtEdCompPhone').value||'',
  };
  if (payload.title.length < 2) { ndUI.toast('Title is required','error'); return; }
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid, {
    method:'PATCH', headers:{...hdrs(),'Content-Type':'application/json'}, body: JSON.stringify(payload)
  });
  if (r.ok) { ndUI.toast('Task updated ✓','success'); openQuickTaskDrawer(qid); }
  else {
    const e = await r.json().catch(()=>({}));
    ndUI.toast(_extractErr(e,'Update failed'),'error');
  }
}
