async function qtAddNote(qid, parentNoteId){
  const inputId = parentNoteId ? ('qtReplyInput_'+parentNoteId) : 'qtNoteInput';
  const input = document.getElementById(inputId);
  const note = (input?.value || '').trim();
  // Attachments only on the top-level comment box (not replies).
  const fileInput = parentNoteId ? null : document.getElementById('qtNoteFile');
  const picked = (fileInput && fileInput.files) ? Array.from(fileInput.files) : [];
  if (!note && !picked.length) return;
  const fd = new FormData();
  fd.append('note', note);
  if (parentNoteId) fd.append('parent_note_id', parentNoteId);
  picked.forEach(f => fd.append('files', f));
  // Include @mentions still present in the text (top-level box only).
  if (!parentNoteId && window._qtMentions){
    const ids = Object.keys(window._qtMentions).filter(id => note.includes('@' + window._qtMentions[id]));
    if (ids.length) fd.append('mentions', ids.join(','));
  }
  const r = await fetch('/nidaan/ops/api/quick-tasks/'+qid+'/notes', {
    method:'POST', headers: hdrs(),   // multipart — let the browser set Content-Type
    body: fd,
  });
  if (r.ok) { input.value=''; if (fileInput) fileInput.value=''; openQuickTaskDrawer(qid); }
  else ndUI.toast('Failed to add comment','error');
}

  const statusColors = {
    awaiting_review:'#06b6d4', awaiting_qc:'#fbbf24', awaiting_approval:'#a78bfa',
    in_progress:'#22d3ee', blocked:'#f87171', drafting:'#94a3b8',
    submitted:'#34d399', under_negotiation:'#fbbf24',
  };
  const total = tasks.reduce((s,t)=>s + (t.cnt||0), 0);
  const rows = tasks.length ? tasks.map(t => {
    const color = statusColors[t.status_slug] || '#94a3b8';
    const label = (t.status_slug||'').replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());

      <div onclick="drillIntoTaskStatus('${esc(t.status_slug)}','${esc(label)}')"
           style="display:flex;justify-content:space-between;align-items:center;padding:.55rem .75rem;

  return `

async function renderActiveClaimsWidget(statusFilter, search) {
  window._ovStatusFilter = statusFilter; window._ovSearch = search;  // remember for filter toggles

  if (statusFilter) params.set('status', statusFilter);
  if (search) params.set('search', search);

  const r = await API('/claims?' + params);
  if (!r.ok) { body.innerHTML = '<div style="padding:1rem;color:#fca5a5;font-size:.85rem">Failed to load</div>'; return; }

      ${chip('unpaid_lead', '🟠 Leads', pl.unpaid_lead, _opsPayFilter==='unpaid_lead')}
      ${chip('paid', '🟢 Paid', pl.paid, _opsPayFilter==='paid')}
      ${chip('subscription', '🔵 Sub', pl.subscription, _opsPayFilter==='subscription')}
    </div>` : '';
  if (!claims.length) {
    body.innerHTML = bar + '<div style="padding:1rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">No claims match these filters.</div>';

      <td>₹${fmt(c.disputed_amount||0)}</td>

      <td style="font-size:.75rem;color:rgba(255,255,255,.5)">${esc(c.assigned_staff_name||'—')}</td>
      <td style="font-size:.72rem;color:rgba(255,255,255,.35)">${fmtDate(c.created_at)}</td>
    </tr>`).join('');
  body.innerHTML = bar + `
    <div class="table-wrap" style="max-height:480px;overflow-y:auto">
      <table>
        <thead>
          <tr><th>#</th><th>Insured</th><th>Type</th><th>Insurer</th><th>Disputed</th><th>Pay</th><th>Status</th><th>Owner</th><th>Assigned</th><th>Created</th></tr>

      Showing ${claims.length}${d.count > claims.length ? ' of '+d.count : ''}

// ── Drill-in from Task Pipeline widget: filter claims that have tasks in this status
async function drillIntoTaskStatus(statusSlug, label) {
  // Open Claims panel with a custom inline filter banner
  showPanel('claims');
  // Fetch tasks in that status and group by claim
  const r = await fetch('/nidaan/ops/api/tasks/kanban', { headers: hdrs() });
  if (!r.ok) { ndUI.toast('Failed to load tasks','error'); return; }
  const groups = await r.json();
  // Flatten across all stages, pick matching status
  const all = Object.values(groups).flat();
  const matching = all.filter(t => t.status_slug === statusSlug);
  const claimIds = [...new Set(matching.map(t => t.claim_id))];
  const wrap = document.getElementById('claimTableWrap');
  if (!wrap) return;
  // Filter the rendered table to these claims (data-driven re-render).
  const r2 = await API('/claims?limit=500');
  if (!r2.ok) return;
  const claims = ((await r2.json()).claims || []).filter(c => claimIds.includes(c.claim_id));
  const rows = claims.map(c=>`
    <tr onclick="openClaimDrawer(${c.claim_id})" style="cursor:pointer">
      <td><strong>#${fmtClaimNum(c.claim_id)}</strong></td>
      <td>${esc(c.insured_name)}</td>
      <td>${esc(c.claim_type||'—')}</td>
      <td>${esc(c.insurer_name||'—')}</td>
      <td>₹${fmt(c.disputed_amount||0)}</td>
      <td><span class="pill-status ${claimStatusClass(c.status)}">${(c.status||'').replace(/_/g,' ')}</span></td>
      <td>${esc(c.owner_name||'—')}</td>
      <td>${esc(c.assigned_staff_name||'—')}</td>
      <td style="font-size:.72rem;color:rgba(255,255,255,.35)">${fmtDate(c.created_at)}</td>
    </tr>`).join('');
  wrap.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);border-radius:8px;padding:.55rem 1rem;margin-bottom:.85rem">
      <div style="font-size:.85rem">🗂️ Showing ${claims.length} claim${claims.length===1?'':'s'} with tasks in <b>${esc(label)}</b></div>

}

async function createBranch() {
  const code = (document.getElementById('brCode').value||'').trim().toUpperCase();
  const city = (document.getElementById('brCity').value||'').trim();
  const name = (document.getElementById('brName').value||'').trim();
  const contact_email = (document.getElementById('brEmail').value||'').trim();
  if (!code || !city) { alert('Branch code and city are required.'); return; }
  const r = await API('/branches', {method:'POST', body: JSON.stringify({branch_code:code, city, name, contact_email})});
  const d = await r.json().catch(()=>({}));
  if (!r.ok) { alert(d.detail || 'Could not create branch.'); return; }
  loadBranches();
}
async function toggleBranch(code, status) {
  const r = await API('/branches/'+encodeURIComponent(code), {method:'PATCH', body: JSON.stringify({status})});
  if (!r.ok) { const d=await r.json().catch(()=>({})); alert(d.detail||'Failed to update branch.'); return; }
  loadBranches();
}
async function editBranchEmail(code, current) {
  const email = prompt('Alert email for branch '+code+' (blank to clear):', current||'');
  if (email===null) return;
  const r = await API('/branches/'+encodeURIComponent(code), {method:'PATCH', body: JSON.stringify({contact_email: email.trim()})});
  if (!r.ok) { const d=await r.json().catch(()=>({})); alert(d.detail||'Failed to update email.'); return; }
  loadBranches();
}
async function showBranchUnpaid(code) {
  const wrap = document.getElementById('branchLeadsWrap');

  const d = await r.json();
  if (!d.leads || !d.leads.length) { wrap.innerHTML=`<div class="empty"><div class="ei">✅</div><p>No unpaid leads for ${esc(code)}</p></div>`; return; }
  const rows = d.leads.map(L=>`

async function updateStatus(claimId) {
  const sel = document.getElementById('newStatusSel_'+claimId);
  const note = document.getElementById('statusNote_'+claimId).value.trim();
  const msgEl = document.getElementById('statusMsg_'+claimId);
  const r = await API('/claims/'+claimId+'/status', {
    method:'PATCH', body: JSON.stringify({new_status: sel.value, note})
  });
  const d = await r.json().catch(()=>({}));
  if (r.ok) {
    msgEl.className='msg ok'; msgEl.textContent='Status updated ✓';
    setTimeout(()=>openClaimDrawer(claimId),1000);
  } else {
    msgEl.className='msg err'; msgEl.textContent=_extractErr(d,'Failed');
  }
}

async function deliverReview(claimId) {
  const outcome = document.getElementById('rvOutcomeSel_'+claimId).value;
  const findings = (document.getElementById('rvFindings_'+claimId).value || '').trim();
  const msgEl = document.getElementById('rvMsg_'+claimId);
  if (!outcome) { msgEl.className='msg err'; msgEl.textContent='Select an outcome.'; return; }
  if (!findings) { msgEl.className='msg err'; msgEl.textContent='Enter the assessment to share with the customer.'; return; }
  if (!confirm('Deliver this review to the customer? They will be notified on dashboard + WhatsApp + email.')) return;
  const r = await API('/claims/'+claimId+'/deliver-review', { method:'POST', body: JSON.stringify({outcome, findings}) });
  const d = await r.json().catch(()=>({}));
  if (r.ok) { msgEl.className='msg ok'; msgEl.textContent='Review delivered ✓ Customer notified.'; setTimeout(()=>openClaimDrawer(claimId),1100); }
  else { msgEl.className='msg err'; msgEl.textContent=_extractErr(d,'Failed to deliver'); }
}

async function assignClaim(claimId) {
  const sel = document.getElementById('assignSel_'+claimId);
  const msgEl = document.getElementById('assignMsg_'+claimId);
  if (!sel.value) { msgEl.className='msg err'; msgEl.textContent='Select a staff member'; return; }
  const r = await API('/claims/'+claimId+'/assign', {
    method:'POST', body: JSON.stringify({staff_id: parseInt(sel.value)})
  });
  const d = await r.json().catch(()=>({}));
  if (r.ok) {
    msgEl.className='msg ok'; msgEl.textContent='Assigned ✓';
    setTimeout(()=>openClaimDrawer(claimId),1000);
  } else {
    msgEl.className='msg err'; msgEl.textContent=_extractErr(d,'Failed');
  }
}

async function opsLoadMessages(claimId){
  const el = document.getElementById('opsMsgThread_'+claimId); if(!el) return;
  try {
    const r = await API('/claims/'+claimId+'/messages');
    if(!r.ok){ el.innerHTML=''; return; }
    const msgs = (await r.json()).messages || [];
    el.innerHTML = msgs.length ? msgs.map(m=>{
      const staff = m.sender_type==='staff';
      const who = staff ? (m.staff_name||'You') : 'Subscriber';
      const t = m.created_at ? String(m.created_at).replace('T',' ').slice(5,16) : '';
      return `<div style="align-self:${staff?'flex-end':'flex-start'};max-width:82%;background:${staff?'rgba(8,145,178,.22)':'rgba(255,255,255,.06)'};border:1px solid ${staff?'rgba(34,211,238,.3)':'rgba(255,255,255,.1)'};border-radius:12px;padding:.5rem .7rem">
        <div style="font-size:.7rem;color:rgba(255,255,255,.5);margin-bottom:.15rem">${esc(who)} · ${t}</div>
        <div style="white-space:pre-wrap">${esc(m.content)}</div></div>`;
    }).join('') : '<div style="color:rgba(255,255,255,.35);text-align:center;padding:.5rem">No messages yet</div>';
    el.scrollTop = el.scrollHeight;
  } catch(e){ el.innerHTML=''; }
}
async function opsSendMessage(claimId){
  const inp = document.getElementById('opsMsgInput_'+claimId); if(!inp) return;
  const content = (inp.value||'').trim(); if(!content) return;
  inp.value=''; inp.disabled=true;
  try { await API('/claims/'+claimId+'/messages', {method:'POST', body:JSON.stringify({content})}); await opsLoadMessages(claimId); } catch(e){}
  inp.disabled=false; inp.focus();
}

async function addNote(claimId) {
  const input = document.getElementById('noteInput_'+claimId);
  const note = input.value.trim();
  if (!note) return;
  const r = await API('/claims/'+claimId+'/notes', {method:'POST', body:JSON.stringify({note})});
  if (r.ok) {
    input.value='';
    // Refresh notes inline
    const nr = await API('/claims/'+claimId+'/notes');
    if (nr.ok) {
      const nd = await nr.json();
      document.getElementById('notesArea_'+claimId).innerHTML = nd.notes.map(n=>`
        <div class="note-item">
          <div class="note-meta">${esc(n.staff_name)} · ${fmtDate(n.created_at)}</div>
          <div class="note-text">${esc(n.note)}</div>
        </div>`).join('') || '<div style="font-size:.8rem;color:rgba(255,255,255,.3)">No notes yet</div>';
    }
  }
}

async function addFollowup(claimId) {
  const due = document.getElementById('fuDate_'+claimId).value;
  const note = document.getElementById('fuNote_'+claimId).value.trim();
  if (!due) return;
  const r = await API('/claims/'+claimId+'/followups', {method:'POST', body:JSON.stringify({due_date:due,note})});
  if (r.ok) {
    document.getElementById('fuDate_'+claimId).value='';
    document.getElementById('fuNote_'+claimId).value='';
    setTimeout(()=>openClaimDrawer(claimId),500);
  }
}

async function markFollowupDone(fuId, claimId) {
  await API('/followups/'+fuId+'/done', {method:'PATCH'});
  setTimeout(()=>openClaimDrawer(claimId),400);
}

function closeDrawer(e) {
  if (e && e.target !== document.getElementById('drawerBg')) return;
  document.getElementById('drawerBg').classList.remove('open');
}

      <div><div class="section-title">Advisor Accounts</div><div class="section-sub">All registered advisors</div></div>

function filterAccounts(q) {
  const list = (window._allAccounts||[]).filter(a=>
    !q || (a.owner_name||'').toLowerCase().includes(q.toLowerCase()) ||
    (a.email||'').toLowerCase().includes(q.toLowerCase()) ||
    (a.firm_name||'').toLowerCase().includes(q.toLowerCase())
  );
  renderAccounts(list);
}

function renderAccounts(accounts) {
  if (!accounts.length) {
    document.getElementById('accTableWrap').innerHTML='<div class="empty"><p>No accounts found</p></div>'; return;

    const deleted = (a.status||'')==='deleted';
    return `
    <tr style="cursor:pointer" onclick="openAccountDrawer(${a.account_id})">
      ${isSA?`<td onclick="event.stopPropagation()" style="text-align:center">${deleted?'':`<input type="checkbox" ${_accSel.has(a.account_id)?'checked':''} onchange="toggleAccSel(${a.account_id},this.checked)">`}</td>`:''}
      <td><strong>#${a.account_id}</strong></td>
      <td>${esc(a.owner_name)}</td>
      <td>${esc(a.firm_name||'—')}</td>
      <td>${esc(a.email)}</td>
      <td>${esc(a.phone||'—')}</td>
      <td><span class="pill-status s-${a.plan||'free'}">${a.plan||'free'}</span></td>
      <td><span class="pill-status s-${a.status||'active'}">${a.status||'active'}</span></td>
      <td style="font-size:.72rem;color:rgba(255,255,255,.35)">${fmtDate(a.created_at)}</td>
      <td onclick="event.stopPropagation()">
        ${isSA?`
        <button class="btn-icon" onclick="openEditAccountModal(${a.account_id})" title="Edit">✏️</button>
        <button class="btn-icon" onclick="doImpersonate(${a.account_id})" title="Login as Advisor">🔑</button>

      </td>

    <div style="font-size:.75rem;color:rgba(255,255,255,.35);margin-bottom:.4rem">💡 Click any row to view account details, claims and reviews</div>
    <div class="table-wrap">
      <table>
        <thead><tr>${isSA?'<th></th>':''}<th>#</th><th>Name</th><th>Firm</th><th>Email</th><th>Phone</th><th>Plan</th><th>Status</th><th>Joined</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>

}

// ── Account delete (single + bulk) with a 2-step type-to-confirm guard ─────────
let _accSel = new Set();
function toggleAccSel(id, on){ if(on)_accSel.add(id); else _accSel.delete(id); updateAccBulkBar(); }
function updateAccBulkBar(){
  const bar=document.getElementById('accBulkBar'); if(!bar)return;
  if(_accSel.size){ bar.style.display='flex'; const c=document.getElementById('accSelCount'); if(c)c.textContent=_accSel.size; }
  else bar.style.display='none';
}
function deleteSelectedAccounts(){ if(_accSel.size) confirmDeleteAccounts([..._accSel]); }
function confirmDeleteAccounts(ids){
  const accts=(window._allAccounts||[]).filter(a=>ids.includes(a.account_id) && (a.status||'')!=='deleted');
  if(!accts.length)return;
  const single=accts.length===1;
  const confirmWord=single?((accts[0].owner_name||'').trim()||'DELETE'):'DELETE';
  // Stash on globals so the inline handlers don't have to embed (and break on)
  // names containing quotes/spaces.
  window._delConfirmWord = confirmWord;
  window._delIds = accts.map(a=>a.account_id);
  const listHtml=accts.map(a=>`<li style="margin:.2rem 0">#${a.account_id} — <b>${esc(a.owner_name)}</b> &lt;${esc(a.email)}&gt;</li>`).join('');
  const ov=document.createElement('div');
  ov.id='delModalOv';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:1rem';
  ov.innerHTML=`
    <div style="background:#0f1e3a;border:1px solid rgba(239,68,68,.45);border-radius:14px;max-width:480px;width:100%;padding:1.5rem">
      <div style="font-size:1.15rem;font-weight:800;color:#fca5a5;margin-bottom:.5rem">⚠️ Delete ${accts.length} account${accts.length>1?'s':''}?</div>
      <div style="font-size:.85rem;color:rgba(255,255,255,.7);margin-bottom:.7rem">This permanently removes their <b>claims, documents and personal data</b> (an anonymised billing record is kept as required by law). <b style="color:#fca5a5">This cannot be undone.</b></div>
      <ul style="font-size:.82rem;color:rgba(255,255,255,.85);max-height:150px;overflow:auto;background:rgba(255,255,255,.04);border-radius:8px;padding:.6rem .6rem .6rem 1.6rem;margin:0 0 1rem">${listHtml}</ul>
      <div id="delStep1" style="display:flex;gap:.6rem;justify-content:flex-end">
        <button class="btn btn-ghost" onclick="closeDelModal()">Cancel</button>
        <button class="btn" style="background:#b91c1c;color:#fff" onclick="delStep2()">Continue →</button>
      </div>
      <div id="delStep2" style="display:none">
        <div style="font-size:.82rem;color:rgba(255,255,255,.7);margin:.2rem 0 .4rem">Type <b style="color:#fca5a5">${esc(confirmWord)}</b> to confirm:</div>
        <input id="delConfirmInput" autocomplete="off" placeholder="${esc(confirmWord)}" style="width:100%;margin-bottom:.85rem" oninput="delCheckConfirm(this)">
        <div style="display:flex;gap:.6rem;justify-content:flex-end">
          <button class="btn btn-ghost" onclick="closeDelModal()">Cancel</button>
          <button id="delFinalBtn" class="btn" style="background:#dc2626;color:#fff" disabled onclick="doDeleteAccounts()">Delete permanently</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(ov);
}
function delStep2(){ document.getElementById('delStep1').style.display='none'; document.getElementById('delStep2').style.display=''; setTimeout(()=>document.getElementById('delConfirmInput').focus(),50); }
function delCheckConfirm(input){ const b=document.getElementById('delFinalBtn'); if(b) b.disabled = (input.value.trim() !== window._delConfirmWord); }
function closeDelModal(){ const o=document.getElementById('delModalOv'); if(o)o.remove(); }
async function doDeleteAccounts(){
  const ids = window._delIds || [];
  if(!ids.length) return;
  const btn=document.getElementById('delFinalBtn'); if(btn){btn.disabled=true;btn.textContent='Deleting…';}
  try {
    if(ids.length===1){
      const r=await API('/accounts/'+ids[0],{method:'DELETE'});
      if(!r.ok){const d=await r.json().catch(()=>({}));alert(d.detail||'Delete failed');}
    } else {
      const r=await API('/accounts/bulk-delete',{method:'POST',body:JSON.stringify({account_ids:ids})});
      if(!r.ok){const d=await r.json().catch(()=>({}));alert(d.detail||'Bulk delete failed');}
    }
  } finally { closeDelModal(); _accSel.clear(); loadAccounts(); }
}

function openCreateAccountModal() {
  openModal('Create Advisor Account', `
    <div class="form-field"><label>Owner Name</label><input id="na-name" class="form-input" placeholder="Full name"></div>
    <div class="form-field"><label>Email</label><input id="na-email" class="form-input" type="email" placeholder="advisor@example.com"></div>
    <div class="form-field"><label>Phone</label><input id="na-phone" class="form-input" placeholder="+91 9XXXXXXXXX"></div>
    <div class="form-field"><label>Firm Name</label><input id="na-firm" class="form-input" placeholder="Optional"></div>
    <div class="msg" id="na-msg"></div>`,
    [{label:'Cancel', cls:'btn-ghost', fn: closeModal},
     {label:'Create', cls:'btn-primary', fn: createAccount}]
  );
}

async function createAccount() {
  const body = {
    owner_name: document.getElementById('na-name').value.trim(),
    email: document.getElementById('na-email').value.trim(),
    phone: document.getElementById('na-phone').value.trim(),
    firm_name: document.getElementById('na-firm').value.trim(),
  };
  const msg = document.getElementById('na-msg');
  if (!body.owner_name||!body.email||!body.phone){msg.className='msg err';msg.textContent='Name, email, phone required';return;}
  const r = await API('/accounts', {method:'POST', body:JSON.stringify(body)});
  const d = await r.json().catch(()=>({}));
  if (r.ok) { msg.className='msg ok'; msg.textContent='Account created! A random password is set — edit to update.'; setTimeout(()=>{closeModal();loadAccounts();},1500); }
  else { msg.className='msg err'; msg.textContent=_extractErr(d,'Failed'); }
}

function openEditAccountModal(accountId) {
  const a = (window._allAccounts||[]).find(x=>x.account_id===accountId);
  if (!a) return;
  openModal('Edit Account #'+accountId, `
    <div class="form-field"><label>Owner Name</label><input id="ea-name" class="form-input" value="${esc(a.owner_name||'')}"></div>
    <div class="form-field"><label>Firm</label><input id="ea-firm" class="form-input" value="${esc(a.firm_name||'')}"></div>
    <div class="form-field"><label>Phone</label><input id="ea-phone" class="form-input" value="${esc(a.phone||'')}"></div>
    <div class="form-field"><label>Status</label><select id="ea-status" class="form-input"><option value="active" ${a.status==='active'?'selected':''}>Active</option><option value="suspended" ${a.status==='suspended'?'selected':''}>Suspended</option></select></div>
    <div class="form-field"><label>New Password (leave blank to keep)</label><input id="ea-pwd" class="form-input" type="password" placeholder="Min 8 characters"></div>
    <div class="msg" id="ea-msg"></div>`,
    [{label:'Cancel', cls:'btn-ghost', fn:closeModal},
     {label:'Save', cls:'btn-primary', fn:()=>saveAccount(accountId)}]
  );
}

async function saveAccount(accountId) {
  const pwd = document.getElementById('ea-pwd').value;
  const body = {
    owner_name: document.getElementById('ea-name').value.trim(),
    firm_name: document.getElementById('ea-firm').value.trim(),
    phone: document.getElementById('ea-phone').value.trim(),
    status: document.getElementById('ea-status').value,
  };
  if (pwd) { if (pwd.length<8){document.getElementById('ea-msg').className='msg err';document.getElementById('ea-msg').textContent='Password min 8 chars';return;} body.new_password=pwd; }
  const r = await API('/accounts/'+accountId, {method:'PATCH', body:JSON.stringify(body)});
  if (r.ok) { setTimeout(()=>{closeModal();loadAccounts();},800); }
  else { const d=await r.json().catch(()=>({})); document.getElementById('ea-msg').className='msg err'; document.getElementById('ea-msg').textContent=_extractErr(d,'Failed'); }
}

async function doImpersonate(accountId) {
  if (!confirm('Generate a login token for account #'+accountId+'?\n\nThis will be logged. Use only for troubleshooting.')) return;
  const r = await API('/accounts/'+accountId+'/impersonate', {method:'POST'});
  if (!r.ok) { const d=await r.json().catch(()=>({})); alert('Failed: '+_extractErr(d,'Unknown error')); return; }
  const d = await r.json();
  // Store token and open dashboard in new tab
  localStorage.setItem('nidaan_token', d.advisor_token);
  localStorage.setItem('nidaan_plan', d.plan||'free');
  window.open('/nidaan/dashboard', '_blank');
}

async function doImpersonateStaff(staffId) {
  const s = (window._allStaff||[]).find(x=>x.staff_id===staffId);
  if (localStorage.getItem('nidaan_admin_token')) {
    alert('You are already viewing as another staff member. Return to your account first.');
    return;
  }
  if (!confirm('View the portal as '+(s?s.name:'#'+staffId)+'?\n\nThis is logged. You can return to your own account anytime from the banner at the top.')) return;
  const r = await API('/staff/'+staffId+'/impersonate', {method:'POST'});
  if (!r.ok) { const d=await r.json().catch(()=>({})); alert('Failed: '+_extractErr(d,'Unknown error')); return; }
  const d = await r.json();
  // Back up MY admin token so I can return, then switch this tab to the staff view.
  const myToken = localStorage.getItem('nidaan_ops_token');
  localStorage.setItem('nidaan_admin_token', myToken);
  localStorage.setItem('nidaan_admin_name', _staffName || 'my account');
  localStorage.setItem('nidaan_ops_token', d.staff_token);
  location.href = '/admins';   // reload this tab as the staff member
}

// Persistent banner shown whenever you're viewing as another staff member.
function renderImpersonationBanner() {
  const adminTok = localStorage.getItem('nidaan_admin_token');
  let bar = document.getElementById('imperBanner');
  if (!adminTok) { if (bar) bar.remove(); return; }
  if (!bar) {
    bar = document.createElement('div');
    bar.id = 'imperBanner';
    bar.style.cssText = 'position:sticky;top:0;z-index:200;background:#7c3aed;color:#fff;'
      + 'display:flex;align-items:center;justify-content:center;gap:.75rem;flex-wrap:wrap;'
      + 'padding:.5rem .9rem;font-size:.84rem;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.3)';
    document.body.prepend(bar);
  }
  bar.innerHTML = `👤 Viewing as <strong>${esc(_staffName||'staff')}</strong> (${esc((_role||'').replace(/_/g,' '))})`
    + `<button onclick="stopImpersonating()" style="background:#fff;color:#7c3aed;border:none;`
    + `font-weight:700;padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-size:.82rem">← Return to my account</button>`;
}

function stopImpersonating() {
  const admin = localStorage.getItem('nidaan_admin_token');
  if (admin) {
    localStorage.setItem('nidaan_ops_token', admin);
    localStorage.removeItem('nidaan_admin_token');
    localStorage.removeItem('nidaan_admin_name');
  }
  location.href = '/admins';
}

                    color:${_acctDrawerTab===t?'#22d3ee':'rgba(255,255,255,.55)'};
                    white-space:nowrap;transition:color .15s">
          ${labels[t]}
        </div>`).join('')}
    </div>`;

  // Tab body
  let body = '';
  if (_acctDrawerTab === 'summary') body = _acctTabSummary(d);
  else if (_acctDrawerTab === 'purchases') body = _acctTabPurchases(d);
  else if (_acctDrawerTab === 'claims') body = _acctTabClaims(d);
  else if (_acctDrawerTab === 'tasks') body = _acctTabTasks(d);
  else if (_acctDrawerTab === 'activity') body = _acctTabActivity(d);

  document.getElementById('acctDrawerBody').innerHTML = `${hero}${tabBar}<div style="padding:1.25rem 1.75rem 2rem">${body}</div>`;
}

  const rows = claims.map(c => `
    <tr onclick="openClaimDrawer(${c.claim_id});closeAccountDrawer()" style="cursor:pointer">
      <td><strong>#${fmtClaimNum(c.claim_id)}</strong></td>
      <td>${esc(c.insured_name||'—')}</td>
      <td>${esc((c.claim_type||'').replace(/_/g,' '))}</td>
      <td>${esc(c.insurer_name||'—')}</td>
      <td>₹${fmt(c.disputed_amount||0)}</td>

function _acctTabActivity(d) {
  return _renderTimeline(d.timeline || [], false);

function _renderTimeline(items, compact) {
  if (!items.length) return '<div style="padding:1.5rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">No recent activity</div>';
  return items.map(it => {
    const icon = it.kind==='status' ? '🔄' : it.kind==='note' ? '💬' : it.kind==='payment' ? '💳' : '•';
    const title = it.kind==='status'
      ? `Status: ${esc((it.from_status||'—').replace(/_/g,' '))} → ${esc((it.to_status||'').replace(/_/g,' '))}`
      : it.kind==='note' ? 'Note added'
      : it.kind==='payment' ? `Payment · ${esc(it.detail||'')}`
      : '';
    const claimRef = it.claim_id
      ? `<a onclick="event.stopPropagation();openClaimDrawer(${it.claim_id});closeAccountDrawer()" style="color:#22d3ee;cursor:pointer">#${fmtClaimNum(it.claim_id)} ${esc(it.insured_name||'')}</a>`
      : '';
    const detail = it.kind === 'note' && it.detail ? `<div style="font-size:.78rem;color:rgba(255,255,255,.55);margin-top:.2rem">${esc(it.detail).substring(0,200)}${it.detail.length>200?'…':''}</div>` : '';
    return `
      <div style="display:flex;gap:.6rem;padding:.55rem .65rem;border-bottom:1px solid rgba(255,255,255,.05)">
        <div style="font-size:1rem;flex-shrink:0">${icon}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:.82rem">${title} ${claimRef ? ' · ' + claimRef : ''}</div>
          ${detail}
          <div style="font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.15rem">
            ${esc((it.ts||'').replace('T',' ').substring(0,16))}${it.staff_name?` · ${esc(it.staff_name)}`:''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function viewClaimDocs(claimId, btn) {
  // Toggle: if docs already showing below this row, close them
  const existingRow = document.getElementById('docsRow_' + claimId);
  if (existingRow) { existingRow.remove(); btn.textContent = '📎 View'; return; }
  btn.textContent = '⏳';
  try {
    const r = await API('/claims/' + claimId + '/documents');
    const d = await r.json().catch(()=>({docs:[]}));
    const td = btn.closest('tr');
    const colCount = td.cells.length;
    const newRow = document.createElement('tr');
    newRow.id = 'docsRow_' + claimId;
    newRow.style.cssText = 'background:rgba(59,130,246,.06)';
    newRow.innerHTML = `<td colspan="${colCount}" style="padding:.75rem 1rem">
      <div style="font-size:.78rem;font-weight:700;color:rgba(255,255,255,.45);margin-bottom:.4rem">📎 DOCUMENTS FOR CLAIM #${fmtClaimNum(claimId)}</div>
      ${d.docs && d.docs.length > 0
        ? d.docs.map(f=>`<div style="margin:.25rem 0">📄 <a href="${f.url}" target="_blank" style="color:#93c5fd;text-decoration:none">${esc(f.original_name)}</a> <span style="opacity:.4;font-size:.75rem">(${(f.file_size/1024).toFixed(0)} KB · ${f.uploaded_at?f.uploaded_at.slice(0,10):''})</span></div>`).join('')
        : '<span style="color:rgba(255,255,255,.35);font-size:.82rem">No documents uploaded for this claim yet.</span>'
      }
    </td>`;
    td.insertAdjacentElement('afterend', newRow);
    btn.textContent = '📎 Close';
  } catch(e) {
    btn.textContent = '📎 View';
  }
}

const REVIEW_STATUS_LABELS = {

};
const REVIEW_STATUS_ORDER = ['paid','in_review','review_completed','completed','cancelled'];

async function loadReviews() {
  // Panel removed in Phase 5 — reviews live inside Account drawer

  const el = document.getElementById('panel-reviews');
  if (!el) return;
  el.innerHTML = `
    <div class="section-hdr">

    </div>
    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <select id="rvStatusFilter" class="form-input" style="width:auto" onchange="loadReviews()">
        <option value="">All Statuses</option>
        ${REVIEW_STATUS_ORDER.map(s=>`<option value="${s}">${REVIEW_STATUS_LABELS[s]}</option>`).join('')}
      </select>
    </div>
    <div id="rvTableWrap"><div class="empty"><p>Loading…</p></div></div>`;
  const statusFilter = document.getElementById('rvStatusFilter')?.value || '';
  const r = await API('/review-requests' + (statusFilter ? '?status='+encodeURIComponent(statusFilter) : ''));
  if (!r.ok) { document.getElementById('rvTableWrap').innerHTML='<div class="empty"><p>Failed to load</p></div>'; return; }

  if (!reviews.length) { document.getElementById('rvTableWrap').innerHTML='<div class="empty"><p>No review requests</p></div>'; return; }

  const cards = reviews.map(rv => {
    const userEmail = esc(rv.account_email || rv.advisor_email || '—');
    const userPhone = esc(rv.account_phone || rv.advisor_phone || '—');
    const userName  = esc(rv.owner_name || rv.advisor_name || rv.insured_name || '—');
    const firmName  = rv.firm_name ? `<span style="opacity:.5;font-size:.8rem"> · ${esc(rv.firm_name)}</span>` : '';
    const descSnip  = rv.brief_description ? rv.brief_description.substring(0,80) + (rv.brief_description.length > 80 ? '…' : '') : '';
    return `
    <div class="rv-card" id="rv-card-${rv.purchase_id}" style="border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.85rem 1rem;margin-bottom:.7rem;background:rgba(255,255,255,.03)">
      <div style="display:flex;align-items:flex-start;gap:.8rem;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;margin-bottom:.3rem">
            <span style="font-weight:700;font-size:.88rem">#${rv.purchase_id}</span>
            <span class="pill-status s-${rv.status}">${REVIEW_STATUS_LABELS[rv.status]||rv.status}</span>
            <span style="font-size:.75rem;color:rgba(255,255,255,.35)">${fmtDate(rv.created_at)}</span>
          </div>
          <div style="font-size:.9rem;font-weight:600">${userName}${firmName}</div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.5);margin-top:.15rem">
            <a href="mailto:${userEmail}" style="color:#22d3ee;text-decoration:none">${userEmail}</a> · ${userPhone}
          </div>
          <div style="font-size:.8rem;margin-top:.3rem;color:rgba(255,255,255,.55)">
            <b>${esc(rv.claim_type||'—').replace(/_/g,' ')}</b> · ${esc(rv.insurer_name||'—')} · ₹${fmt(rv.disputed_amount||0)} disputed
          </div>
          ${descSnip ? `<div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-top:.2rem">${esc(descSnip)}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;gap:.4rem;align-items:flex-end">
          <span style="font-size:.95rem;font-weight:700;color:#4ade80">₹${fmt(rv.amount_paid||0)}</span>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">

      </div>
    </div>`;
  }).join('');
  document.getElementById('rvTableWrap').innerHTML = `<div>${cards}</div>`;

async function toggleRvDetails(purchaseId) {
  const detail = document.getElementById(`rv-detail-${purchaseId}`);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : '';
  if (!isOpen) {
    // Load documents
    const docsEl = document.getElementById(`rv-docs-${purchaseId}`);
    try {
      const r = await API(`/review-requests/${purchaseId}/documents`);
      if (r.ok) {
        const d = await r.json();
        const docs = d.docs || [];
        if (docs.length) {
          docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br>` +
            docs.map(doc => `<div style="margin-top:.3rem"><a href="${esc(doc.url)}" target="_blank" style="color:#22d3ee;text-decoration:none">📄 ${esc(doc.original_name)}</a> <span style="opacity:.35">(${(doc.file_size/1024).toFixed(0)} KB)</span></div>`).join('');
        } else {
          docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br><span style="color:rgba(255,255,255,.25)">No documents uploaded</span>`;
        }
      }
    } catch(_) {
      docsEl.innerHTML = `<span style="opacity:.45">Documents</span><br><span style="color:rgba(255,255,255,.25)">Could not load</span>`;
    }
  }
}

// Normalise to a clean 10-digit Indian mobile (strips +91/0), else null —
// mirrors the server so a malformed number is rejected, never truncated.
function _normMobile(raw){
  let d=(raw||'').replace(/\D/g,'');
  if(d.length===12&&d.startsWith('91')) d=d.slice(2);
  else if(d.length===11&&d.startsWith('0')) d=d.slice(1);
  return (d.length===10 && '6789'.includes(d[0])) ? d : null;
}

// ── Live input restrictions (prevent bad data at the keystroke) ──────────────
// Mobile: keep digits only, transparently drop a pasted +91/0 prefix, cap at 10.
function _liveMobile(el){
  let d=el.value.replace(/\D/g,'');
  if(d.length>10){ if(d.startsWith('91')) d=d.slice(2); else if(d.startsWith('0')) d=d.slice(1); }
  el.value=d.slice(0,10);
  // green tick once it's a valid 10-digit mobile
  const ok=(el.value.length===10 && '6789'.includes(el.value[0]));
  el.style.borderColor = el.value.length ? (ok?'rgba(34,197,94,.6)':'rgba(248,113,113,.6)') : '';
}
// Login ID: lowercase, only [a-z0-9._-], and refresh the @nidaanpartner.com preview.
function onLoginIdInput(el){
  el.value=el.value.toLowerCase().replace(/[^a-z0-9._-]/g,'');
  const p=document.getElementById('ns-emailpreview');
  if(p) p.textContent = el.value ? el.value+'@nidaanpartner.com' : '—';
}
// Email: strip whitespace; tint border by validity.
function _liveEmail(el){
  el.value=el.value.replace(/\s/g,'');
  const ok=/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(el.value);
  el.style.borderColor = el.value.length ? (ok?'rgba(34,197,94,.6)':'rgba(248,113,113,.6)') : '';
}

  if(!document.getElementById('ns-name').value.trim()||!userpart||!document.getElementById('ns-pwd').value){msg.className='msg err';msg.textContent='All fields required';return;}

  if(notify_email && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(notify_email)){msg.className='msg err';msg.textContent='Enter a valid notification email (or leave blank)';return;}
  if(!/^[a-z0-9._-]+$/.test(userpart)){msg.className='msg err';msg.textContent='Email username: only letters, numbers, dots, hyphens';return;}

function openModal(title, bodyHtml, buttons=[], wide=false) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalFooter').innerHTML = buttons.map(b=>
    `<button class="btn ${b.cls}">${b.label}</button>`).join('');
  document.getElementById('modalFooter').querySelectorAll('button').forEach((btn,i)=>{
    btn.onclick = buttons[i].fn;
  });
  const modalEl = document.getElementById('modal');
  if (wide) modalEl.classList.add('modal-lg'); else modalEl.classList.remove('modal-lg');
  document.getElementById('modalBg').classList.add('open');
  // Close on backdrop click
  document.getElementById('modalBg').onclick = e => { if(e.target===document.getElementById('modalBg')) closeModal(); };
}

function closeModal() {
  document.getElementById('modal').classList.remove('modal-lg');
  document.getElementById('modalBg').classList.remove('open');
}

// Deep links from notifications (WhatsApp/email): /nidaan/ops?qt=<id> opens the
// quick-task drawer; ?task=<id> jumps to the Tasks panel.
function _handleDeepLink(){
  try {
    const p = new URLSearchParams(location.search);
    const qt = p.get('qt');
    const task = p.get('task');
    const leave = p.get('leave');
    const account = p.get('account');
    const claim = p.get('claim');
    // CRITICAL: strip the deep-link params from the URL immediately so a reload
    // or panel navigation doesn't re-open the same task over and over
    // (the "task keeps popping up" bug). We act on the value we already captured.
    if (qt || task || leave || account || claim) {
      try { history.replaceState({panel:_currentPanel}, '', location.pathname + (location.hash||'')); } catch(e){}
    }
    if (qt && /^\d+$/.test(qt)) {
      setTimeout(()=>{ try{ openQuickTaskDrawer(parseInt(qt,10)); }catch(e){} }, 350);
    } else if (account && /^\d+$/.test(account)) {
      // From a signup / new-claim / lead alert → open the subscriber's account.
      setTimeout(()=>{ try{ openAccountDrawer(parseInt(account,10)); }catch(e){} }, 350);
    } else if (task && /^\d+$/.test(task)) {
      setTimeout(()=>{ try{ showPanel('claims'); }catch(e){} }, 350);
    } else if (claim && /^\d+$/.test(claim)) {
      setTimeout(()=>{ try{ showPanel('claims'); }catch(e){} }, 350);
    } else if (leave && /^\d+$/.test(leave)) {
      setTimeout(()=>{ try{ showPanel('tasks'); }catch(e){} }, 350);
    }
  } catch(e){}
}

/* ── Web Push (PWA push notifications) ── */
function _pushSupported(){ return ('serviceWorker' in navigator) && ('PushManager' in window); }
function _urlB64ToUint8(base64){
  const pad = '='.repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw = atob(b64); const out = new Uint8Array(raw.length);
  for (let i=0;i<raw.length;i++) out[i] = raw.charCodeAt(i);
  return out;
}
async function _currentPushSub(){
  if (!_pushSupported()) return null;
  try { const reg = await navigator.serviceWorker.ready; return await reg.pushManager.getSubscription(); }
  catch(e){ return null; }
}
async function refreshPushRow(){
  const lbl = document.getElementById('pushRowLabel');
  const btn = document.getElementById('pushToggleBtn');
  if (!lbl || !btn) return;
  if (!_pushSupported()){ lbl.textContent='📲 Push not supported on this browser'; btn.style.display='none'; return; }
  if (Notification.permission === 'denied'){
    lbl.textContent='🔕 Push blocked — enable in browser settings'; btn.style.display='none'; return;
  }
  const sub = await _currentPushSub();
  if (sub){ lbl.textContent='🔔 Push alerts ON for this device'; btn.textContent='Turn off'; btn.style.background='rgba(255,255,255,.08)'; }
  else { lbl.textContent='📲 Get task & broadcast alerts on this phone'; btn.textContent='Enable'; btn.style.background='linear-gradient(135deg,#7c3aed,#22d3ee)'; }
}
async function togglePush(){
  if (!_pushSupported()){ ndUI.toast('Push not supported here','error'); return; }
  const existing = await _currentPushSub();
  if (existing){
    try {
      await fetch('/nidaan/ops/api/push/unsubscribe',{method:'POST',headers:{...hdrs(),'Content-Type':'application/json'},body:JSON.stringify({endpoint:existing.endpoint})});
      await existing.unsubscribe();
      ndUI.toast('Push alerts turned off','success');
    } catch(e){}
    refreshPushRow(); return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted'){ ndUI.toast('Permission not granted','error'); refreshPushRow(); return; }
    const kr = await fetch('/nidaan/ops/api/push/vapid-key',{headers:hdrs()});
    const {key} = await kr.json();
    if (!key){ ndUI.toast('Push not configured on server','error'); return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:_urlB64ToUint8(key)});
    await fetch('/nidaan/ops/api/push/subscribe',{method:'POST',headers:{...hdrs(),'Content-Type':'application/json'},body:JSON.stringify(sub)});
    ndUI.toast('🔔 Push alerts enabled on this device','success');
    // fire a confirmation push
    fetch('/nidaan/ops/api/push/test',{method:'POST',headers:hdrs()}).catch(()=>{});
  } catch(e){ ndUI.toast('Could not enable push','error'); }
  refreshPushRow();
}

let _statusesCache = null;
let _assigneesCache = null;

async function _loadStatusesOnce(){
  if (_statusesCache) return _statusesCache;
  const r = await fetch('/nidaan/ops/api/status-config', { headers: hdrs() });
  if (r.ok) { const d = await r.json(); _statusesCache = d.statuses || []; }
  return _statusesCache || [];
}

async function _loadAssigneesOnce(){
  if (_assigneesCache) return _assigneesCache;
  const r = await fetch('/nidaan/ops/api/assignees', { headers: hdrs() });
  if (r.ok) { const d = await r.json(); _assigneesCache = d.staff || []; }
  return _assigneesCache || [];
}

let _taskCatsCache = null;
async function _loadTaskCategoriesOnce(force){
  if (_taskCatsCache && !force) return _taskCatsCache;
  const r = await fetch('/nidaan/ops/api/task-categories', { headers: hdrs() });
  if (r.ok) { const d = await r.json(); _taskCatsCache = d.categories || []; }

function _taskCat(code){
  if (!code) return null;
  return (_taskCatsCache || []).find(c => c.code === code) || {code, label: code, color: '#64748b'};
}
function _taskCatBadge(code){
  const c = _taskCat(code);
  if (!c) return '';
  return `<span title="${esc(c.label||c.code)}" style="font-size:.66rem;font-weight:800;letter-spacing:.02em;background:${c.color}22;color:${c.color};border:1px solid ${c.color}55;padding:.05rem .4rem;border-radius:4px;flex-shrink:0">${esc(c.code)}</span>`;
}

function _statusLabel(slug, statuses) {
  const s = (statuses||[]).find(x => x.slug === slug);
  return s ? s.label_en : slug;
}
function _statusColor(slug, statuses) {
  const s = (statuses||[]).find(x => x.slug === slug);
  return s ? s.color : '#94a3b8';
}

async function loadTasksKanban(){
  // Panel removed in Phase 5 — kanban now reached via Overview drill-in.
  // Legacy callers (task drawer refreshes) fall back to refreshing the
  // currently-open Claim drawer's per-claim task list.
  const panel = document.getElementById('panel-tasks');
  if (!panel) {
    // Refresh in-place if a claim drawer is open and visible
    const drawerBg = document.getElementById('drawerBg');
    if (drawerBg && drawerBg.classList.contains('open')) {
      // Find any open claimTasksArea_* element and reload it
      const areas = document.querySelectorAll('[id^="claimTasksArea_"]');
      areas.forEach(a => {
        const cid = parseInt(a.id.replace('claimTasksArea_',''));
        if (cid) loadClaimTasks(cid);
      });
    }
    return;
  }
  panel.innerHTML = '<div style="padding:1.5rem">Loading…</div>';
  const [statuses, assignees] = await Promise.all([_loadStatusesOnce(), _loadAssigneesOnce()]);
  const r = await fetch('/nidaan/ops/api/tasks/kanban', { headers: hdrs() });
  if (!r.ok) { panel.innerHTML = '<div style="padding:1.5rem;color:#fca5a5">Failed to load tasks ('+r.status+')</div>'; return; }
  const groups = await r.json();
  const showCreate = (_role === 'super_admin' || _role === 'sub_super_admin');
  let html = `
    <div style="padding:1.25rem 1.5rem 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem">
      <div>
        <h1 style="font-size:1.4rem;font-weight:800">🗂️ Task Pipeline</h1>
        <div style="font-size:.85rem;color:rgba(255,255,255,.5);margin-top:.2rem">Workflow visualisation — drag cards to move stages or click any card for details.</div>
      </div>
      ${showCreate ? `<button class="nd-btn nd-btn-primary" onclick="openCreateTaskModal()">+ Create Task</button>` : ''}
    </div>
    <div style="padding:1rem 1.5rem 2rem;overflow-x:auto;-webkit-overflow-scrolling:touch">
      <div class="kanban-grid">`;
  STAGES.forEach(stage => {
    const tasks = (groups[stage.key] || []);
    html += `
      <div class="kanban-col" data-stage="${stage.key}">
        <div class="kanban-col-head" style="border-top:3px solid ${stage.color}">
          <span>${esc(stage.label)}</span>
          <span class="kanban-col-count">${tasks.length}</span>
        </div>
        <div class="kanban-col-body" data-stage-body="${stage.key}">
          ${tasks.map(t => _taskCardHtml(t, statuses, assignees)).join('') || '<div class="kanban-empty">No tasks</div>'}
        </div>
      </div>`;
  });
  html += '</div></div>';
  panel.innerHTML = html;
}

function _taskCardHtml(t, statuses, assignees){
  const stColor = _statusColor(t.status_slug, statuses);
  const stLabel = _statusLabel(t.status_slug, statuses);
  const assigneeName = (assignees.find(a => a.staff_id === t.assigned_to_staff_id) || {}).name || '—';
  const sla = t.sla_due_at ? `Due ${ndUI.timeAgo(t.sla_due_at)}` : '';
  const overdue = t.sla_due_at && (ndUI.parseServerTime(t.sla_due_at) < new Date());
  const priority = t.priority || 'normal';
  return `
    <div class="task-card${overdue ? ' overdue':''}" onclick="openTaskDrawer(${t.task_id})">
      <div class="task-card-head">
        <span class="task-pill" style="background:${stColor}22;color:${stColor};border:1px solid ${stColor}33">${esc(stLabel)}</span>
        ${priority !== 'normal' ? `<span class="task-prio prio-${priority}">${priority.toUpperCase()}</span>`: ''}
      </div>
      <div class="task-card-title">${esc(t.title)}</div>
      <div class="task-card-meta">
        <span title="Claim #${fmtClaimNum(t.claim_id)}">#${fmtClaimNum(t.claim_id)} · ${esc((t.claim_insured_name||'').slice(0,18))}</span>
        ${sla ? `<span class="${overdue?'task-overdue':''}">${esc(sla)}</span>` : ''}
      </div>
      <div class="task-card-foot">
        <span>👤 ${esc(assigneeName)}</span>
      </div>
    </div>`;
}

let _currentTaskId = null;

// Render task notes as a 1-level threaded discussion.
// Notes with parent_note_id nest under their parent; deeper replies are
// flattened to the same level (enforced server-side too).
function _renderTaskThread(notes, taskId, canComment){
  if (!notes || !notes.length) {
    return '<div style="color:rgba(255,255,255,.35);font-size:.85rem">No comments yet — say something to kick things off.</div>';
  }
  const roleColors = {super_admin:'#a78bfa', sub_super_admin:'#22d3ee', team_member:'#86efac'};
  const roleLabel = {super_admin:'SA', sub_super_admin:'ADMIN', team_member:'ASSOC'};
  const byParent = {};
  const roots = [];
  notes.forEach(n => {
    if (n.parent_note_id) {
      (byParent[n.parent_note_id] = byParent[n.parent_note_id] || []).push(n);
    } else {
      roots.push(n);
    }
  });
  const renderNote = (n, isReply) => {
    const color = roleColors[n.staff_role] || '#94a3b8';
    const label = roleLabel[n.staff_role] || 'STAFF';
    return `
      <div style="${isReply?'margin-left:1.25rem;border-left:2px solid '+color+'33;padding-left:.6rem':''};margin-bottom:.6rem">
        <div style="font-size:.74rem;color:rgba(255,255,255,.55)">
          <span style="color:${color};font-weight:700">[${label}]</span>
          <b style="color:rgba(255,255,255,.85)">${esc(n.staff_name||'Staff')}</b> · ${ndUI.timeAgo(n.created_at)}
        </div>
        <div style="font-size:.88rem;margin-top:.15rem;white-space:pre-wrap">${esc(n.note)}</div>
        ${n.note_translation ? `<div style="font-size:.8rem;margin-top:.25rem;color:#93c5fd;background:rgba(59,130,246,.08);border-left:2px solid rgba(59,130,246,.45);padding:.2rem .55rem;border-radius:0 5px 5px 0">🌐 English (auto): ${esc(n.note_translation)}</div>` : ''}
        ${(!isReply && canComment) ? `
          <button onclick="toggleReply(${n.note_id})"
                  style="font-size:.72rem;background:transparent;border:none;color:rgba(34,211,238,.85);cursor:pointer;padding:.15rem 0;margin-top:.15rem">↩ Reply</button>
          <div id="replyBox_${n.note_id}" style="display:none;margin-top:.3rem">
            <input id="replyInput_${n.note_id}" placeholder="Reply to ${esc((n.staff_name||'').split(' ')[0])}…"
                   onkeydown="if(event.key==='Enter')addTaskNote(${taskId},${n.note_id})"
                   style="width:calc(100% - 60px);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);color:#fff;padding:.4rem .55rem;border-radius:6px;font-size:.82rem">
            <button onclick="addTaskNote(${taskId},${n.note_id})"
                    style="margin-left:.3rem;background:rgba(34,211,238,.18);border:1px solid rgba(34,211,238,.3);color:#22d3ee;padding:.4rem .65rem;border-radius:6px;font-size:.78rem;cursor:pointer">Send</button>
          </div>` : ''}
        ${(byParent[n.note_id]||[]).map(c => renderNote(c, true)).join('')}
      </div>`;
  };
  return roots.map(n => renderNote(n, false)).join('');
}

function toggleReply(noteId){
  const box = document.getElementById('replyBox_'+noteId);
  if (!box) return;
  const show = box.style.display === 'none';
  box.style.display = show ? 'block' : 'none';
  if (show) setTimeout(() => document.getElementById('replyInput_'+noteId)?.focus(), 30);
}

      </div>

      ${trans.length && canEdit ? `

  document.getElementById('drawerBg').classList.add('open');

async function taskTransition(taskId, toStatus, requiresNote){
  let note = '';
  if (requiresNote) {
    note = prompt('A short note is required to make this transition:');
    if (note === null) return;
    if (!note.trim()) { ndUI.toast('Note required','error'); return; }
  }
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/transition', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({to_status:toStatus, note: note||''})
  });
  if (r.ok) { ndUI.toast('Status updated','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e = await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Transition failed'),'error'); }
}

async function taskQC(taskId, approve){
  const note = prompt(approve?'QC approval note (optional):':'Reason for QC rejection:') || '';
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/qc-review', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({approve, note})
  });
  if (r.ok) { ndUI.toast(approve?'QC approved':'QC kicked back','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e=await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Failed'),'error'); }
}

async function taskApproval(taskId, approve){
  const note = prompt(approve?'Approval note (optional):':'Reason for rejection:') || '';
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/approve', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({approve, note})
  });
  if (r.ok) { ndUI.toast(approve?'Approval recorded':'Rejection recorded','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else { const e=await r.json().catch(()=>({detail:'Error'})); ndUI.toast(_extractErr(e,'Failed'),'error'); }
}

async function addTaskNote(taskId, parentNoteId){
  const inputId = parentNoteId ? ('replyInput_'+parentNoteId) : 'taskNoteInput';
  const input = document.getElementById(inputId);
  const note = (input?.value||'').trim();
  if (!note) return;
  const body = { note, is_internal: true };
  if (parentNoteId) body.parent_note_id = parentNoteId;
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/notes', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) { input.value=''; openTaskDrawer(taskId); }
  else ndUI.toast('Failed to add note','error');
}

async function openReassignTask(taskId){
  const assignees = await _loadAssigneesOnce();
  const opts = assignees.map(a=>`<option value="${a.staff_id}">${esc(a.name)} (${esc(a.role)})</option>`).join('');
  const choice = prompt('Reassign to staff_id (one of):\n'+assignees.map(a=>`${a.staff_id} = ${a.name}`).join('\n')+'\nEnter blank to unassign:');
  if (choice === null) return;
  const newId = choice.trim() === '' ? null : parseInt(choice.trim());
  const r = await fetch('/nidaan/ops/api/tasks/'+taskId+'/assign', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({assigned_to_staff_id: newId})
  });
  if (r.ok) { ndUI.toast('Reassigned','success'); openTaskDrawer(taskId); loadTasksKanban(); }
  else ndUI.toast('Failed to reassign','error');
}

async function submitNewTask(claimId){
  const title = (document.getElementById('ntTitle_'+claimId)?.value || '').trim();
  if (!title) { ndUI.toast('Title is required','error'); return; }
  const assigneeVal = document.getElementById('ntAssignee_'+claimId).value;
  const priority = document.getElementById('ntPriority_'+claimId).value;
  const depToggle = document.getElementById('ntDepToggle_'+claimId).checked;
  const depVal = depToggle ? document.getElementById('ntDep_'+claimId).value : '';
  const comment = (document.getElementById('ntComment_'+claimId)?.value || '').trim();
  const body = {
    claim_id: claimId,
    title,
    status_slug: 'initial_review',
    priority,
  };
  if (assigneeVal) body.assigned_to_staff_id = parseInt(assigneeVal);
  if (depVal) body.depends_on_task_id = parseInt(depVal);
  if (comment) body.initial_comment = comment;
  const r = await fetch('/nidaan/ops/api/tasks', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  if (r.ok) {
    ndUI.toast('Task created ✓','success');
    document.getElementById('newTaskForm_'+claimId)?.remove();
    loadClaimTasks(claimId);
  } else {
    const e = await r.json().catch(()=>({detail:'Error'}));
    ndUI.toast(_extractErr(e, 'Create failed'),'error');
  }
}

async function loadClaimTasks(claimId){
  const area = document.getElementById('claimTasksArea_'+claimId);
  if (!area) return;
  // Preserve any open create-form during refresh
  const openForm = document.getElementById('newTaskForm_'+claimId);
  const [statuses, assignees] = await Promise.all([_loadStatusesOnce(), _loadAssigneesOnce()]);
  const r = await fetch('/nidaan/ops/api/tasks?claim_id='+claimId, { headers: hdrs() });
  if (!r.ok) { area.innerHTML = '<div style="color:#fca5a5;font-size:.85rem">Failed to load tasks</div>'; return; }
  const d = await r.json();
  const tasks = d.tasks || [];

  if (!tasks.length) {
    area.innerHTML = (openForm ? openForm.outerHTML : '') +
      '<div style="padding:.75rem 0;font-size:.82rem;color:rgba(255,255,255,.4)">No tasks for this claim yet.</div>';
    return;
  }

  // Group by dependency: tasks with no `depends_on_task_id` are roots; others
  // nest under the task they're blocked by. Single-level tree.
  const byId = Object.fromEntries(tasks.map(t => [t.task_id, t]));
  const roots = tasks.filter(t => !t.depends_on_task_id || !byId[t.depends_on_task_id]);
  const children = {};
  tasks.forEach(t => {
    if (t.depends_on_task_id && byId[t.depends_on_task_id]) {
      (children[t.depends_on_task_id] = children[t.depends_on_task_id] || []).push(t);
    }
  });

  const renderTask = (t, isChild) => {
    const stColor = _statusColor(t.status_slug, statuses);
    const stLabel = _statusLabel(t.status_slug, statuses);
    const assignee = (assignees.find(a => a.staff_id === t.assigned_to_staff_id) || {}).name || 'Unassigned';
    const isComplete = (t.status_slug === 'completed' || t.status_slug === 'cancelled');
    const parent = t.depends_on_task_id ? byId[t.depends_on_task_id] : null;
    const isBlocked = parent && parent.status_slug !== 'completed' && parent.status_slug !== 'cancelled';
    const dueLabel = t.sla_due_at ? (t.sla_due_at||'').split('T')[0] : '';
    return `
      <div style="${isChild?'margin-left:1.5rem;border-left:2px solid rgba(255,255,255,.08);padding-left:.75rem':''}">
        <div onclick="openTaskDrawer(${t.task_id})"
             style="padding:.6rem .8rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-left:3px solid ${stColor};border-radius:6px;margin-bottom:.4rem;cursor:pointer;${isComplete?'opacity:.55':''}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem">
            <div style="flex:1;min-width:0">
              <div style="font-size:.86rem;font-weight:600">
                ${isChild?'↳ ':''}${esc(t.title||'Task')}
                ${isBlocked?'<span style="font-size:.7rem;color:#fbbf24;margin-left:.4rem">⏸ blocked</span>':''}
              </div>
              <div style="font-size:.74rem;color:rgba(255,255,255,.55);margin-top:.2rem">
                <span style="color:${stColor}">${esc(stLabel)}</span> · @ ${esc(assignee)}
                ${t.priority && t.priority!=='normal'?` · <b style="color:#fbbf24">${esc(t.priority)}</b>`:''}
              </div>
            </div>
            ${dueLabel ? `<div style="font-size:.72rem;color:rgba(255,255,255,.5);white-space:nowrap">${esc(dueLabel)}</div>`:''}
          </div>
        </div>
        ${(children[t.task_id]||[]).map(c => renderTask(c, true)).join('')}
      </div>`;
  };

  area.innerHTML = (openForm ? openForm.outerHTML : '') + roots.map(t => renderTask(t, false)).join('');
}

async function qtCatDelete(id, label){
  if (!confirm('Deactivate category "'+label+'"? It will disappear from pickers but stay on existing tasks.')) return;

// Browser speech has three well-known traps we have to handle explicitly:
//  1. getVoices() is EMPTY on first call (voices load async) → wait for them.
//  2. Chrome silently fails on long utterances → speak in short chunks.
//  3. Chrome halts synthesis after ~15s → keep it alive with resume().
let _guideQueue = [], _guideIdx = 0, _guideKeepAlive = null, _guideStopped = false;

function _guideVoices(){
  return new Promise(resolve => {
    const got = window.speechSynthesis.getVoices();
    if (got && got.length) return resolve(got);
    let done = false;
    const finish = () => { if(!done){ done = true; resolve(window.speechSynthesis.getVoices()||[]); } };
    window.speechSynthesis.onvoiceschanged = finish;
    setTimeout(finish, 1200);   // some browsers never fire the event
  });
}

function _guideChunks(text){
  // Split on sentence ends (Hindi danda too), then pack into ~180-char pieces.
  const parts = String(text).split(/(?<=[।.!?])\s+/);
  const out = []; let buf = '';
  for (const p of parts) {
    if ((buf + ' ' + p).trim().length > 180) { if (buf.trim()) out.push(buf.trim()); buf = p; }
    else buf += ' ' + p;
  }
  if (buf.trim()) out.push(buf.trim());
  return out.filter(Boolean);
}

async function guideSpeak(){
  if (!('speechSynthesis' in window)) {
    ndUI.toast('This browser cannot play audio','error'); return;
  }
  guideStop();
  _guideStopped = false;
  if (!_guideSpeech) return;
  const note = document.getElementById('guideAudioNote');
  const wantHi = (_guideLang === 'hi');
  const lang = wantHi ? 'hi-IN' : 'en-IN';

  if (note) note.textContent = 'Loading voice…';
  const voices = await _guideVoices();
  const voice = voices.find(v => v.lang === lang)
             || voices.find(v => (v.lang||'').replace('_','-').toLowerCase().startsWith(wantHi ? 'hi' : 'en'));

  if (wantHi && !voice) {
    // Be honest rather than playing silence.
    if (note) note.innerHTML = '<span style="color:#fbbf24">No Hindi voice on this device — see note below.</span>';
    const help = document.getElementById('guideVoiceHelp');
    if (help) help.style.display = 'block';
    return;
  }
  if (note) note.textContent = voice ? ('Voice: ' + voice.name) : '';

  _guideQueue = _guideChunks(_guideSpeech);
  _guideIdx = 0;
  const btn = document.getElementById('guidePlayBtn');
  const speakNext = () => {
    if (_guideStopped || _guideIdx >= _guideQueue.length) { guideStop(); return; }
    const u = new SpeechSynthesisUtterance(_guideQueue[_guideIdx]);
    u.lang = lang; u.rate = 0.95;
    if (voice) u.voice = voice;
    u.onend = () => { _guideIdx++; if (!_guideStopped) speakNext(); };
    u.onerror = () => { _guideIdx++; if (!_guideStopped) speakNext(); };
    if (btn) btn.textContent = `⏸ ${_guideIdx+1}/${_guideQueue.length}`;
    window.speechSynthesis.speak(u);
  };
  // Keep Chrome from pausing mid-narration.
  _guideKeepAlive = setInterval(() => {
    try { if (window.speechSynthesis.speaking) window.speechSynthesis.resume(); } catch(e){}
  }, 8000);
  speakNext();
}

function guideStop(){
  _guideStopped = true;
  try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch(e){}
  if (_guideKeepAlive) { clearInterval(_guideKeepAlive); _guideKeepAlive = null; }
  _guideQueue = []; _guideIdx = 0;
  const b = document.getElementById('guidePlayBtn');
  if (b) b.textContent = (_guideLang==='hi' ? '🔊 सुनें' : '🔊 Listen');
}

// Show what this device actually has — makes "no Hindi audio" diagnosable.
async function guideShowVoices(){
  const box = document.getElementById('guideVoiceList');
  if (!box) return;
  const v = await _guideVoices();
  const hi = v.filter(x => (x.lang||'').toLowerCase().startsWith('hi'));
  box.style.display = 'block';
  box.innerHTML = `<b>${v.length}</b> voices found on this device · <b>${hi.length}</b> Hindi.<br>` +
    (hi.length ? hi.map(x=>`✅ ${esc(x.name)} (${esc(x.lang)})`).join('<br>')
               : '<span style="color:#fbbf24">No Hindi voice installed — that is why Hindi audio is silent.</span>');
}

// Live-refreshing QR pairing. WhatsApp rotates its QR every ~20s and invalidates
// the old code — scanning a stale one gives "Couldn't link device / try again later".
// So we poll for a fresh QR every ~18s and swap the image, exactly like web.whatsapp.com,
// and auto-detect the moment the session connects.
let _qrPollTimer = null;
function _stopQRPoll(){ if(_qrPollTimer){ clearInterval(_qrPollTimer); _qrPollTimer=null; } }

function _qrSrc(d){ return d.qr ? (d.qr.startsWith('data:') ? d.qr : 'data:image/png;base64,'+d.qr) : ''; }

function _renderQRConnected(slot){
  _stopQRPoll();
  document.getElementById('drawerBody').innerHTML = `
    <div style="text-align:center;padding:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">✅</div>
      <h3 style="margin-bottom:.5rem;color:#22c55e">Slot ${slot} connected!</h3>
      <div style="font-size:.85rem;color:rgba(255,255,255,.6)">WhatsApp is now linked and ready to send.</div>
    </div>`;
  ndUI.toast('Slot '+slot+' connected!','success');
  loadOfficialNumbers();
}

function _renderQRDrawer(slot, d){
  const qrSrc = _qrSrc(d);
  let html;
  if (d.already_connected || d.state === 'open') {
    html = `
      <div style="text-align:center;padding:1.5rem">
        <div style="font-size:2.5rem;margin-bottom:.5rem">✅</div>
        <h3 style="margin-bottom:.5rem;color:#22c55e">Slot ${slot} is already connected</h3>
        <div style="font-size:.85rem;color:rgba(255,255,255,.6)">
          No QR needed — this WhatsApp instance is paired and active. If you want to re-pair
          (e.g. moved SIM to a new phone), use Re-pair to log it out first.
        </div>
      </div>`;
  } else {
    html = `
      <div style="text-align:center;padding:1rem">
        <h3 style="margin-bottom:.5rem">Pair Slot ${slot}</h3>
        <div style="font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:.75rem">
          Open <b>the official WhatsApp app</b> on the SIM phone → Settings → Linked devices → Link a device → Scan this code.
        </div>
        <div id="qrHolder">
        ${qrSrc ? `<img id="qrImg" src="${qrSrc}" style="width:280px;height:280px;max-width:100%;background:#fff;padding:1rem;border-radius:8px">` :
                  `<div id="qrImg" style="color:#fbbf24;padding:2rem">⏳ Generating QR — Baileys is booting…</div>`}
        </div>
        <div style="font-size:.75rem;color:rgba(255,255,255,.45);margin-top:.6rem;line-height:1.4">
          🔄 This QR refreshes automatically every ~20s. Scan it as soon as it appears — if you scan an
          old code WhatsApp says <i>"try again later"</i>. It links within a few seconds of a good scan.
        </div>
        ${d.pairing_code ? `<div style="margin-top:.75rem;font-family:monospace;font-size:1.2rem;color:#22d3ee">Pair code: ${esc(d.pairing_code)}</div>` : ''}
      </div>`;
  }
  document.getElementById('drawerTitle').textContent = `📷 Pair WhatsApp — Slot ${slot}`;
  document.getElementById('drawerBody').innerHTML = html;
  document.getElementById('drawerBg').classList.add('open');
}

function _startQRPoll(slot){
  _stopQRPoll();
  let polls = 0;
  _qrPollTimer = setInterval(async ()=>{
    // Stop if the drawer was closed, replaced by another view, or we've polled ~4 min.
    if (!document.getElementById('drawerBg').classList.contains('open')) { _stopQRPoll(); return; }
    if (!(document.getElementById('drawerTitle').textContent||'').includes('Pair WhatsApp')) { _stopQRPoll(); return; }
    if (++polls > 13) { _stopQRPoll(); return; }
    try {
      const r = await fetch(`/nidaan/ops/api/official-numbers/${slot}/qr`, { headers: hdrs() });
      if (!r.ok) return;
      const d = await r.json();
      if (d.locked) return;
      if (d.already_connected || d.state === 'open') { _renderQRConnected(slot); return; }
      const qrSrc = _qrSrc(d);
      if (!qrSrc) return;
      let img = document.getElementById('qrImg');
      const holder = document.getElementById('qrHolder');
      if (img && img.tagName === 'IMG') { img.src = qrSrc; }
      else if (holder) { holder.innerHTML = `<img id="qrImg" src="${qrSrc}" style="width:280px;height:280px;max-width:100%;background:#fff;padding:1rem;border-radius:8px">`; }
    } catch(e){}
  }, 18000);
}

async function showQR(slot, force){
  // force=1 → Re-pair: log the (possibly ghost) session out and issue a fresh QR.
  _stopQRPoll();
  const r = await fetch(`/nidaan/ops/api/official-numbers/${slot}/qr${force?'?force=1':''}`, { headers: hdrs() });
  if (!r.ok) {
    const e = await r.json().catch(()=>({detail:'Error'}));
    ndUI.toast('QR fetch failed: ' + _extractErr(e, String(r.status)),'error'); return;
  }
  const d = await r.json();
  if (d.locked) {
    ndUI.toast(d.message || ('Please wait ' + (d.wait_seconds||'a few') + 's before re-pairing'), 'info');
    // Keep the live QR refreshing if the drawer is already open.
    if (document.getElementById('drawerBg').classList.contains('open')) _startQRPoll(slot);
    return;
  }
  _renderQRDrawer(slot, d);
  if (!(d.already_connected || d.state === 'open')) _startQRPoll(slot);
}

    const colors = {processed:'#22c55e', processing:'#06b6d4', pending:'#fbbf24',
                    failed:'#f87171', manual:'#a78bfa'};
    const c = colors[s] || '#94a3b8';
    return `<span class="task-pill" style="background:${c}22;color:${c};border:1px solid ${c}44;padding:.2rem .55rem">${s.toUpperCase()}</span>`;
  };

  const refundRow = (rf) => `
    <div class="nd-card" style="padding:.85rem 1rem;margin-bottom:.65rem">
      <div style="display:flex;justify-content:space-between;gap:.75rem;flex-wrap:wrap">
        <div>
          <div style="font-weight:700;font-size:.95rem">#${rf.refund_id} · ₹${rf.amount}</div>
          <div style="font-size:.82rem;color:rgba(255,255,255,.6);margin-top:.15rem">
            ${esc(rf.owner_name||'—')} · <a href="mailto:${esc(rf.account_email||'')}" style="color:#22d3ee">${esc(rf.account_email||'—')}</a>
          </div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.4);margin-top:.2rem;font-family:monospace">
            sub_id=${rf.sub_id} · order=${esc(rf.razorpay_order_id||'—')} · payment=${esc(rf.razorpay_payment_id||'—')}
          </div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.45);margin-top:.2rem">${esc(rf.reason||'—')}</div>
          ${rf.last_error ? `<div style="font-size:.75rem;color:#fca5a5;margin-top:.3rem;background:rgba(248,113,113,.1);padding:.35rem .6rem;border-radius:5px"><b>Last error:</b> ${esc(rf.last_error)}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.45rem">
          ${statusPill(rf.status)}
          <div style="font-size:.72rem;color:rgba(255,255,255,.4)">${rf.requested_at ? rf.requested_at.split('T')[0] : ''}</div>
          ${(rf.status==='failed' || rf.status==='pending') ? `<button class="nd-btn nd-btn-sm nd-btn-primary" onclick="retryRefund(${rf.refund_id})">🔁 Retry</button>` : ''}
          ${rf.razorpay_refund_id ? `<div style="font-size:.7rem;color:rgba(255,255,255,.4);font-family:monospace">${esc(rf.razorpay_refund_id)}</div>` : ''}
        </div>
      </div>
    </div>`;

  const reviewRow = (s) => `
    <div class="nd-card" style="padding:.85rem 1rem;margin-bottom:.55rem;border-left:3px solid #fbbf24">
      <div style="display:flex;justify-content:space-between;gap:.75rem;flex-wrap:wrap;align-items:flex-start">
        <div>
          <div style="font-weight:700">${esc(s.owner_name||'—')} · ₹${s.amount_paid}</div>
          <div style="font-size:.8rem;color:rgba(255,255,255,.6);margin-top:.15rem">${esc(s.account_email||'—')} · sub_id=${s.sub_id} · ${esc(s.plan)}</div>
          <div style="font-size:.78rem;color:rgba(255,255,255,.45);margin-top:.2rem">
            Cancelled · 0 claims filed · in policy window
          </div>
        </div>
        <button class="nd-btn nd-btn-sm nd-btn-primary" onclick="processRefund(${s.sub_id},${s.amount_paid})">↩️ Refund ₹${s.amount_paid}</button>
      </div>
    </div>`;

  const isEmbedded = (panel.id !== 'panel-refunds');
  const wrap = isEmbedded ? '<div>' : '<div style="padding:1.25rem 1.5rem 2rem">';
  panel.innerHTML = `${wrap}
      ${isEmbedded ? '' : '<h1 style="font-size:1.4rem;font-weight:800;margin-bottom:.3rem">↩️ Refunds</h1>'}
      <div style="color:rgba(255,255,255,.5);font-size:.82rem;margin-bottom:1rem">
        Policy A: full refund when cancelled within <b>${policy.window_days||7} days</b> AND zero claims filed.
        Auto-triggered on cancel; failures can be retried below.
      </div>

      ${needsReview.length ? `
        <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.55rem;color:#fbbf24">⚠️ Needs Action — ${needsReview.length} eligible but unrefunded</h3>
        <div style="margin-bottom:1.25rem">${needsReview.map(reviewRow).join('')}</div>
      ` : ''}

      <h3 style="font-size:.95rem;font-weight:700;margin-bottom:.55rem">Refund history</h3>
      ${refunds.length ? refunds.map(refundRow).join('') :
        '<div style="padding:1.5rem;text-align:center;color:rgba(255,255,255,.4);font-size:.85rem">No refunds yet</div>'}
    </div>`;
}

async function retryRefund(refundId){
  if (!confirm('Retry this refund? Razorpay will be called again.')) return;
  const r = await fetch('/nidaan/ops/api/refunds/'+refundId+'/retry', {
    method:'POST', headers: hdrs()
  });
  if (r.ok) { ndUI.toast('Refund retried successfully','success'); loadRefunds(); return; }
  const e = await r.json().catch(()=>({detail:'Failed'}));
  const msg = _extractErr(e, '');
  if (msg.includes('does not have enough balance')) {
    alert('Razorpay merchant balance is empty. Add funds in Razorpay Dashboard → Funds → Add Money, then retry this refund.');
  } else {
    ndUI.toast('Retry failed: '+(msg.substring(0,180)||r.status),'error');
  }
  loadRefunds();
}

async function processRefund(subId, amount){
  if (!confirm(`Process refund of ₹${amount} for sub_id ${subId}?`)) return;
  const r = await fetch('/nidaan/ops/api/refunds/manual', {
    method:'POST', headers:{...hdrs(),'Content-Type':'application/json'},
    body: JSON.stringify({sub_id: subId, amount: amount, reason: 'sa_manual_from_needs_review'})
  });
  if (r.ok) { ndUI.toast('Refund processed','success'); loadRefunds(); }
  else {
    const e = await r.json().catch(()=>({detail:'Failed'}));
    ndUI.toast('Failed: '+_extractErr(e, String(r.status)),'error');
  }
}
</script>

<script>
(function(){
  // 1) register service worker (root scope so it controls /nidaan/*)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('/nidaan-sw.js', {scope: '/'}).catch(function(){});
    });
    // Auto-update: when a freshly-deployed SW takes control (not the first
    // install), show a one-tap "Update" toast — no data loss, no forced reload.
    var _hadCtrl = !!navigator.serviceWorker.controller;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if (!_hadCtrl || document.getElementById('swUpd')) return;
      var d = document.createElement('div');
      d.id = 'swUpd';
      d.innerHTML = '🔄 New version available <b style="text-decoration:underline;margin-left:.35rem">Update</b>';
      d.style.cssText = 'position:fixed;left:50%;transform:translateX(-50%);bottom:calc(14px + env(safe-area-inset-bottom));z-index:2147483647;background:#0d9488;color:#fff;padding:.6rem 1rem;border-radius:999px;font:600 13px system-ui,sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.4);cursor:pointer';
      d.onclick = function(){ location.reload(); };
      document.body.appendChild(d);
    });
  }
  // 2) install prompt (Android/Chrome/Edge)
  var deferred = null;
  var btn = document.getElementById('pwaInstall');
  var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  window.addEventListener('beforeinstallprompt', function(e){
    e.preventDefault(); deferred = e;
    if (!isStandalone && localStorage.getItem('pwaDismissed') !== '1') btn.style.display = 'inline-flex';
  });
  btn.addEventListener('click', function(ev){
    if (ev.target.classList.contains('x')) { btn.style.display='none'; localStorage.setItem('pwaDismissed','1'); return; }
    if (!deferred) { btn.style.display='none'; return; }
    deferred.prompt();
    deferred.userChoice.finally(function(){ deferred=null; btn.style.display='none'; });
  });
  window.addEventListener('appinstalled', function(){ btn.style.display='none'; });
  // 3) iOS Safari has no beforeinstallprompt — show a one-time hint
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var inSafari = isIOS && !/crios|fxios|edgios/i.test(navigator.userAgent);
  if (inSafari && !isStandalone && localStorage.getItem('pwaIosDismissed') !== '1') {
    setTimeout(function(){ var t=document.getElementById('pwaIosTip'); if(t) t.style.display='block'; }, 3500);
  }
})();
</script>
